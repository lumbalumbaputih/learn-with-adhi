let currentModule = 0;

function render() {
  const nav = document.getElementById('moduleNav');
  nav.innerHTML = MODULES.map((m, i) =>
    '<button onclick="goTo(' + i + ')" class="' + (i === currentModule ? 'active' : '') + '">' + m.short + '</button>'
  ).join('');

  const content = document.getElementById('moduleContent');
  content.innerHTML = MODULES.map((m, i) => 
    '<div class="module ' + (i === currentModule ? 'active' : '') + '" id="' + m.id + '">' +
      '<h2>' + m.title + '</h2>' +
      '<div class="module-meta">' + m.meta + '</div>' +
      m.html +
      '<div class="nav-footer">' +
        '<button class="nav-btn" onclick="goTo(' + (i-1) + ')" ' + (i === 0 ? 'disabled' : '') + '>← Previous</button>' +
        (i < MODULES.length - 1
          ? '<button class="nav-btn primary" onclick="goTo(' + (i+1) + ')">Next →</button>'
          : '<span style="font-family:var(--mono);font-size:.75rem;color:var(--green)">Course complete ✓</span>') +
      '</div>' +
    '</div>'
  ).join('');

  document.getElementById('progressBar').style.width = ((currentModule + 1) / MODULES.length * 100) + '%';
}

function goTo(i) {
  if (i < 0 || i >= MODULES.length) return;
  currentModule = i;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleCheck(el) {
  el.classList.toggle('checked');
}

render();
</script>
