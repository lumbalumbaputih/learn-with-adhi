const MODS = [
/* ===================== MODULE 01 ===================== */
{
  id: 0,
  titleNav: "01 · Why This Portfolio Exists",
  title: 'Why This <span class="accent">Portfolio</span> Exists',
  intro: "Before you talk about any single project, you need the one-sentence answer to 'why did you build these?' — because Australia just made climate-risk disclosure the law, and Perth's consultancies are scrambling to staff the work. Your portfolio is built to sit exactly where that demand is.",
  objectives: [
    "State what AASB S2 is and why 2026 is the inflection point for the whole market",
    "Name the Perth CBD employers hiring for this work and what roles they are filling",
    "Explain why physical climate risk analysis and disclosure readiness are the two in-demand skill areas",
    "Map each of your three projects to a specific employer need"
  ],
  sections: [
    { h: "The thing that changed: AASB S2", body:
      `<p><span class="kt">AASB S2</span> is Australia's mandatory climate-related financial disclosure standard, issued by the Australian Accounting Standards Board. It is the local adoption of the international <span class="kt">IFRS S2</span> standard, and it is law — not a voluntary framework, not best-practice guidance. From <strong>1 January 2026</strong> the largest Australian companies must report their climate-related risks and opportunities inside their annual financial reports, audited and signed off like any other financial statement.</p>
      <p>That last point is what makes this a job market rather than a talking point. Climate risk used to live in a glossy sustainability brochure that nobody audited. Under AASB S2 it sits in the financial report, which means it must be defensible, evidenced, and consistent year to year. Companies that have never quantified a cyclone's effect on a port, or a rainfall decline's effect on a water licence, suddenly have to — and put their name to it.</p>
      <div class="callout c-blue"><b>Key definition</b>AASB S2 = Australian Sustainability Reporting Standard 2, "Climate-related Disclosures." It mandates disclosure across four pillars — governance, strategy, risk management, and metrics &amp; targets — and is phased in by company size, starting with the biggest in FY2025–26.</div>`
    },
    { h: "Why Perth, why now", body:
      `<p>Perth is not a coincidental location for this. Western Australia's economy is concentrated in mining, oil &amp; gas, and resources — exactly the sectors that are both <em>large enough to be in the first reporting wave</em> and <em>exposed enough</em> to physical climate hazards (cyclones over the Pilbara, heat over remote operations, water stress in the south-west) that the disclosures are non-trivial to write.</p>
      <p>So the consultancies with Perth CBD offices are hiring. <span class="kt">Deloitte</span> and the other big-four firms staff climate &amp; sustainability assurance teams. Engineering and environmental consultancies — <span class="kt">GHD</span>, <span class="kt">Arup</span>, and specialist sustainability firms such as <span class="kt">Greenbase</span> — sell physical risk assessments and disclosure-readiness services to the resource majors. The common job titles are climate risk analyst, ESG / sustainability consultant, and climate disclosure advisor.</p>
      <p>Two distinct skill areas drive that demand, and they map cleanly onto your work:</p>
      <ul class="body-list">
        <li><strong>Physical climate risk analysis</strong> — taking real climate data (cyclone tracks, rainfall records, temperature trends) and turning it into a defensible statement about how a hazard is changing and what it means for an asset. Projects 1 and 2.</li>
        <li><strong>Disclosure readiness</strong> — reading a company's reports against the AASB S2 four pillars and identifying where the gaps are. Project 3.</li>
      </ul>
      <div class="callout c-mango"><b>How this shows up in client work</b>A resources company comes to a consultancy and says "we report under AASB S2 next year — are we ready, and can you back our physical risk statements with data?" Answering that <em>is</em> the billable engagement. Your three projects are a rehearsal of exactly that engagement.</div>`
    },
    { h: "Three projects, three needs", body:
      `<p>Hold this mapping in your head — it is the spine of every answer you'll give in an interview:</p>
      <div class="terms-grid">
        <dl class="term-card"><dt>Project 1 — WA Cyclone Intensity Trends</dt><dd>Acute physical risk. Demonstrates you can take historical hazard data and describe a trend that feeds a forward-looking AASB S2 risk statement.</dd></dl>
        <dl class="term-card"><dt>Project 2 — SW WA Rainfall Decline</dt><dd>Chronic physical risk. Demonstrates you understand slow-onset, well-documented climate shifts and their water/agriculture consequences.</dd></dl>
        <dl class="term-card"><dt>Project 3 — AASB S2 Readiness Scoring</dt><dd>Disclosure readiness. Demonstrates you can read a sustainability report against the four pillars and find the gaps a consultant is paid to close.</dd></dl>
      </div>
      <p>Two of the three are physical risk (one acute, one chronic — covering both halves of how AASB S2 defines physical risk), and the third is the disclosure side. Together they cover the full shape of an entry-level climate-risk consulting role.</p>`
    },

/* ===================== MODULE 02 ===================== */
{
  id: 1,
  titleNav: "02 · Physical Risk: The Framework",
  title: 'Physical Climate Risk: The <span class="accent">Framework</span>',
  intro: "AASB S2 splits climate risk into two families: transition risk (from the shift to a low-carbon economy) and physical risk (from the climate itself). Your first two projects are physical risk. This module gives you the vocabulary — acute vs chronic — and shows how historical data becomes a forward-looking disclosure.",
  objectives: [
    "Define physical climate risk as AASB S2 / IFRS S2 use the term",
    "Distinguish acute from chronic physical risk with WA examples",
    "Explain why historical trend analysis is the evidence base for forward-looking risk statements",
    "Describe how a consultant turns this analysis into a section of a client report"
  ],
  sections: [
    { h: "What 'physical risk' means here", body:
      `<p>In AASB S2, <span class="kt">physical climate risk</span> is the risk to a business that arises directly from the physical effects of a changing climate — as opposed to <span class="kt">transition risk</span>, which arises from policy, technology, and market shifts as the world decarbonises. If a cyclone floods a port, that is physical risk. If a carbon price erodes the value of a coal asset, that is transition risk.</p>
      <p>The standard requires a company to describe its material physical risks, explain how resilient its strategy is to them (including under different climate scenarios), and disclose how it identifies, assesses and manages them. To do any of that honestly, somebody has to actually look at the hazard data. That "somebody" is the analyst — the role your portfolio is auditioning for.</p>`
    },
    { h: "Acute vs chronic", body:
      `<p>Physical risk comes in two flavours, and AASB S2 explicitly asks companies to consider both:</p>
      <div class="terms-grid">
        <dl class="term-card"><dt>Acute</dt><dd>Event-driven, sudden. A single cyclone, flood, or extreme-heat day. The risk is about <em>severity and frequency of discrete events</em>. → Project 1 (cyclones).</dd></dl>
        <dl class="term-card"><dt>Chronic</dt><dd>Gradual, long-term shifts in climate. Declining average rainfall, rising mean temperature, sea-level rise. The risk is about a <em>baseline moving permanently</em>. → Project 2 (rainfall decline).</dd></dl>
      </div>
      <div class="figure">
        <svg class="fig-svg" viewBox="0 0 800 300" role="img" aria-label="Acute versus chronic physical risk">
          <g font-family="'Inter',sans-serif">
            <text x="200" y="34" text-anchor="middle" font-size="13" font-weight="700" font-family="'Bricolage Grotesque',sans-serif" fill="#1A1614">ACUTE — discrete shocks</text>
            <text x="600" y="34" text-anchor="middle" font-size="13" font-weight="700" font-family="'Bricolage Grotesque',sans-serif" fill="#1A1614">CHRONIC — moving baseline</text>
            <!-- acute axes -->
            <line x1="60" y1="220" x2="360" y2="220" stroke="#6B6259" stroke-width="1.5"/>
            <line x1="60" y1="60" x2="60" y2="220" stroke="#6B6259" stroke-width="1.5"/>
            <!-- acute spikes -->
            <g stroke="#FF5C39" stroke-width="3">
              <line x1="110" y1="220" x2="110" y2="150"/>
              <line x1="170" y1="220" x2="170" y2="110"/>
              <line x1="250" y1="220" x2="250" y2="95"/>
              <line x1="320" y1="220" x2="320" y2="70"/>
            </g>
            <text x="210" y="245" text-anchor="middle" font-size="10" fill="#6B6259">time →</text>
            <text x="210" y="262" text-anchor="middle" font-size="10" fill="#FF5C39" font-weight="600">cyclones: rarer but more intense spikes</text>
            <!-- chronic axes -->
            <line x1="460" y1="220" x2="760" y2="220" stroke="#6B6259" stroke-width="1.5"/>
            <line x1="460" y1="60" x2="460" y2="220" stroke="#6B6259" stroke-width="1.5"/>
            <!-- chronic declining line -->
            <polyline points="470,110 520,120 560,118 600,140 650,150 700,165 750,178" fill="none" stroke="#1FA9C7" stroke-width="3"/>
            <line x1="470" y1="110" x2="750" y2="178" stroke="#2E3192" stroke-width="1.5" stroke-dasharray="5 4"/>
            <text x="610" y="245" text-anchor="middle" font-size="10" fill="#6B6259">time →</text>
            <text x="610" y="262" text-anchor="middle" font-size="10" fill="#1FA9C7" font-weight="600">rainfall: long-term downward drift</text>
          </g>
        </svg>
        <figcaption>Fig 2.1 — Acute risk is about the spikes; chronic risk is about the trend line beneath them.</figcaption>
      </div>
      <p>The same region can carry both. The Pilbara faces acute cyclone risk <em>and</em> chronic heat increase. The distinction matters because the disclosure language and the data methods differ: acute work counts and characterises events; chronic work fits a trend to a long record.</p>`
    },
    { h: "Why history is the foundation of a forward-looking statement", body:
      `<p>This sounds paradoxical and interviewers love it: AASB S2 asks for <em>forward-looking</em> risk statements, yet the credible evidence is <em>historical</em>. You cannot defensibly say "cyclones affecting our Pilbara port are intensifying" unless you can point to a record — say 1985–2024 — that shows the trend. The historical analysis is the anchor; the forward-looking statement is the extrapolation, ideally cross-checked against climate-model projections (IPCC scenarios).</p>
      <div class="callout c-blue"><b>Key definition</b>A <strong>baseline</strong> is the historical reference period against which change is measured. Picking it well (long enough to average out natural variability, recent enough to be relevant) is half the craft of physical risk analysis.</div>
      <p>This is why Project 1 runs 1985–2024 and Project 2 runs 1950–2024: long records reduce the chance that a few noisy years masquerade as a trend. The longer and cleaner the record, the more weight the forward-looking statement can bear.</p>`
    },
    { h: "How it lands in a client report", body:
      `<p>In practice the analyst's output becomes a few defensible paragraphs plus a chart in the client's risk-assessment deliverable, which the client then distils into their AASB S2 disclosure. The chain is: <em>raw data → trend analysis → plain-language risk statement → disclosure text</em>. The consultant owns the first three; the client (with assurance) owns the last.</p>
      <div class="callout c-mango"><b>How this shows up in client work</b>You won't be handed a clean answer — you'll be handed a messy BOM or IBTrACS file and a question like "is cyclone risk to this asset rising?" Your value is producing a defensible, caveated answer, not a perfect one. Knowing the limits of your data (Module 08) is part of the deliverable, not an afterthought.</div>`
    }
  ],
  quiz: [
    { q: "A carbon price reduces the market value of a company's coal reserves. Under AASB S2 this is best classified as:", opts: ["Acute physical risk", "Chronic physical risk", "Transition risk", "Governance risk"], ans: 2, fb: "Correct. That is transition risk — driven by policy/market shifts toward a low-carbon economy, not by the physical climate. Physical risk would be a cyclone or drought directly hitting an asset. Knowing this split cleanly is foundational." },
    { q: "Which pair correctly matches the risk type to its defining feature?", opts: ["Acute = a permanently shifting baseline; chronic = discrete events", "Acute = discrete severe events; chronic = gradual long-term shifts", "Acute = transition risk; chronic = physical risk", "Acute and chronic are the same thing measured differently"], ans: 1, fb: "Correct. Acute risk is about discrete shocks (a cyclone, a flood); chronic risk is about a slowly moving baseline (declining rainfall, rising mean temperature). Your two physical-risk projects deliberately cover one of each." },
    { q: "Why is a long historical record (e.g. 1985–2024) central to a forward-looking AASB S2 risk statement?", opts: ["The standard forbids using any climate model projections", "A long record averages out natural variability, giving the forward-looking claim a defensible evidence base", "Historical data is the only data that exists for cyclones", "It lets the company avoid disclosing future risk altogether"], ans: 1, fb: "Correct. The forward-looking statement is an extrapolation; its credibility rests on a historical trend long enough to separate real signal from year-to-year noise. History is the anchor that makes the forecast defensible." }
  ]
},

{
  id: 2,
  titleNav: "03 · Project 1 — Cyclone Trends",
  title: 'Project 1: WA <span class="accent">Cyclone</span> Intensity Trends',
  intro: "Your first physical-risk project analyses how tropical cyclone intensity off Western Australia has behaved from 1985 to 2024. This module gives you the data source, the intensity vocabulary, what the trend shows, and — crucially — why it matters to the Pilbara and Kimberley operations a consultancy's clients run.",
  objectives: [
    "Name the dataset and what a cyclone 'track' record contains",
    "Define cyclone intensity in measurable terms (wind, pressure, category)",
    "Explain rapid intensification and why it is the headline risk",
    "Connect the trend to specific WA industries and to AASB S2 reporting"
  ],
  sections: [
    { h: "What the project analyses", body:
      `<p>The project uses <span class="kt">South Indian Ocean cyclone track data</span> — the basin that produces the systems hitting WA's north-west. The data comes from the <span class="kt">IBTrACS</span> archive (International Best Track Archive for Climate Stewardship, NOAA), which merges the official records of the world's meteorological agencies — for this basin primarily Australia's <span class="kt">Bureau of Meteorology (BOM)</span> — into one consistent "best track" per storm.</p>
      <p>A track record is a time series of fixes for one cyclone: every few hours, its position (lat/long) plus its intensity at that moment. Aggregate forty years of these and you can ask: are storms reaching higher intensities? Are the strongest ones getting stronger? Are they intensifying faster?</p>`
    },
    { h: "What 'intensity' actually means", body:
      `<p>Cyclone intensity is measured three interlocking ways — know all three:</p>
      <div class="terms-grid">
        <dl class="term-card"><dt>Maximum sustained wind</dt><dd>The headline number. Higher wind = more destructive potential (damage rises roughly with the square of wind speed).</dd></dl>
        <dl class="term-card"><dt>Minimum central pressure</dt><dd>The pressure at the storm's centre, in hPa. <em>Lower</em> pressure = stronger storm. Often the more reliable historical measure, especially before modern satellite wind estimation.</dd></dl>
        <dl class="term-card"><dt>Category (intensity scale)</dt><dd>A banding of the storm. Australia uses its own 1–5 tropical cyclone category scale; the US Saffir–Simpson scale is the better-known equivalent. Both bucket wind speed into categories.</dd></dl>
      </div>
      <div class="callout c-blue"><b>Key definition</b>Wind and pressure are inversely related: as a cyclone strengthens, central pressure drops and winds rise. When you report a "trend in intensity," you are really reporting a trend in these underlying quantities — and you should say which one, because their data quality differs across the record.</div>`
    },
    { h: "What the trend shows — and rapid intensification", body:
      `<p>Consistent with the global picture in IPCC AR6, the analysis points to <strong>no clear increase in the total number of cyclones, but a shift in the distribution toward the more intense end</strong> — a greater share of high-category storms and lower minimum pressures among the strongest systems. The total count is noisy; the <em>intensity of the strongest storms</em> is the signal that matters for risk.</p>
      <p>The sharpest concern is <span class="kt">rapid intensification</span> (RI): a storm gaining a large amount of intensity in a short window (conventionally ≥35 knots of wind in 24 hours). RI is dangerous precisely because it compresses warning time — a system that looked manageable yesterday makes landfall as a major cyclone today. Warmer sea-surface temperatures provide more energy for RI, which is why it features in forward-looking risk language.</p>
      <div class="figure">
        <svg class="fig-svg" viewBox="0 0 800 280" role="img" aria-label="Shift in cyclone category distribution">
          <g font-family="'Inter',sans-serif">
            <text x="400" y="30" text-anchor="middle" font-size="13" font-weight="700" font-family="'Bricolage Grotesque',sans-serif" fill="#1A1614">Distribution of storms by category: a shift toward the strong end</text>
            <line x1="70" y1="220" x2="760" y2="220" stroke="#6B6259" stroke-width="1.5"/>
            <line x1="70" y1="60" x2="70" y2="220" stroke="#6B6259" stroke-width="1.5"/>
            <text x="40" y="140" text-anchor="middle" font-size="9" fill="#6B6259" transform="rotate(-90 40 140)">share of storms</text>
            <!-- early period bars (grey) -->
            <g fill="#C9BFA8">
              <rect x="110" y="120" width="38" height="100"/>
              <rect x="240" y="100" width="38" height="120"/>
              <rect x="370" y="150" width="38" height="70"/>
              <rect x="500" y="180" width="38" height="40"/>
              <rect x="630" y="200" width="38" height="20"/>
            </g>
            <!-- recent period bars (tomato) -->
            <g fill="#FF5C39">
              <rect x="150" y="150" width="38" height="70"/>
              <rect x="280" y="135" width="38" height="85"/>
              <rect x="410" y="120" width="38" height="100"/>
              <rect x="540" y="135" width="38" height="85"/>
              <rect x="670" y="160" width="38" height="60"/>
            </g>
            <g font-size="10" fill="#6B6259" text-anchor="middle">
              <text x="148" y="238">Cat 1</text>
              <text x="278" y="238">Cat 2</text>
              <text x="408" y="238">Cat 3</text>
              <text x="538" y="238">Cat 4</text>
              <text x="668" y="238">Cat 5</text>
            </g>
            <rect x="540" y="55" width="13" height="13" fill="#C9BFA8"/><text x="560" y="65" font-size="10" fill="#6B6259">1985–2004</text>
            <rect x="650" y="55" width="13" height="13" fill="#FF5C39"/><text x="670" y="65" font-size="10" fill="#6B6259">2005–2024</text>
            <text x="400" y="265" text-anchor="middle" font-size="9" fill="#6B6259">Schematic — illustrates the direction of the shift, not exact published values.</text>
          </g>
        </svg>
        <figcaption>Fig 3.1 — The count stays noisy; the mass of the distribution drifts toward higher categories.</figcaption>
      </div>`
    },
    { h: "The 2025–26 season and what it means for WA industry", body:
      `<p>The 2025–26 WA season provides the live context: in the portfolio's framing, <span class="kt">Cyclone Narelle</span> is the headline event, associated with on the order of <strong>$500 million</strong> in damage and a sharp reminder that the north-west coast is a working industrial coastline, not empty hazard space.</p>
      <div class="stat-grid">
        <div class="stat-card"><div class="stat-num">≈$500M</div><div class="stat-lbl">Indicative damage, Cyclone Narelle, 2025–26 WA season</div><div class="stat-sub">Portfolio dataset</div></div>
        <div class="stat-card"><div class="stat-num">≥35 kt</div><div class="stat-lbl">Wind gain in 24 h that defines rapid intensification — the warning-time killer</div><div class="stat-sub">Standard RI threshold</div></div>
        <div class="stat-card"><div class="stat-num">1985–2024</div><div class="stat-lbl">Record length analysed — long enough to separate trend from year-to-year noise</div><div class="stat-sub">IBTrACS / BOM</div></div>
      </div>
      <p>The exposed industries are concentrated and high-value: iron-ore ports and rail in the <strong>Pilbara</strong> (Port Hedland, Dampier), LNG infrastructure, the <strong>Kimberley</strong>, and pastoral/agricultural operations in the <strong>Gascoyne</strong>. A more intense cyclone, or one that intensifies rapidly before landfall, means longer port shutdowns, higher design-standard requirements, and bigger insured-loss exposure — all of which a resources company now has to describe under AASB S2.</p>
      <div class="callout c-green"><b>What this means for AASB S2 reporting</b>A Pilbara miner's disclosure can't just say "cyclones are a risk." Under AASB S2 it needs an evidenced statement — "the intensity of the strongest cyclones affecting our operations has trended upward over 1985–2024, with rapid-intensification events reducing effective warning time" — and a strategy response. Producing and defending that sentence is the consulting job your project rehearses.</div>`
    }
  ],
  quiz: [
    { q: "Which statement best reflects what the cyclone trend analysis shows?", opts: ["Cyclones are becoming far more frequent every year", "The total count is noisy, but the distribution is shifting toward more intense storms", "Cyclones are disappearing from the South Indian Ocean", "Wind speed and central pressure both rise together as a storm strengthens"], ans: 1, fb: "Correct. The robust signal is intensity, not frequency — a greater share of high-category storms and lower minimum pressures among the strongest. (And note: as a storm strengthens, pressure FALLS while wind rises — they move oppositely.)" },
    { q: "Why is rapid intensification (RI) singled out as a headline risk?", opts: ["It makes cyclones last longer", "It compresses warning time, so a storm can reach major intensity just before landfall", "It only happens to weak storms", "It reduces the damage a cyclone causes"], ans: 1, fb: "Correct. RI (≈≥35 kt gain in 24 h) means a system can jump from manageable to major in a day, collapsing the lead time for evacuation and asset protection. Warmer seas make it more likely, which is why it appears in forward-looking risk language." },
    { q: "A Port Hedland iron-ore exporter must write its AASB S2 physical risk section. Your analysis is most directly useful for:", opts: ["Calculating the company's carbon price exposure", "Providing an evidenced trend statement on cyclone intensity affecting its operations", "Auditing the company's governance committee structure", "Estimating transition risk from the energy market"], ans: 1, fb: "Correct. The analysis turns historical cyclone data into a defensible, evidenced statement about how the hazard to that asset is changing — exactly the physical-risk content AASB S2 requires, and exactly what the company cannot credibly write without the data work." }
  ]
},

  title: 'Project 2: SW WA <span class="accent">Rainfall</span> Decline',
  intro: "Your second physical-risk project is the textbook case of chronic risk: the long, well-documented drying of South West Western Australia. This is one of the most studied regional climate shifts on Earth — which makes it a strong evidence base, and a great interview topic, provided you also know where the nuance lives.",

  ],
  sections: [
    { h: "The step-change", body:
      `<p>Since around the <strong>1970s</strong>, the South West of Western Australia — the corner that holds Perth, the Wheatbelt, and the forests of the south-west — has seen a sustained decline in cool-season (May–October) rainfall, on the order of <strong>15–20%</strong> below the early-20th-century baseline, with the steepest drops in the most recent decades. It is often described as a <span class="kt">step-change</span> rather than a smooth slide: rainfall dropped to a new, lower regime and largely stayed there.</p>
      <p>The data behind this comes from <span class="kt">BOM rainfall station records</span> — some of the longest continuous instrumental records in Australia, running from 1950 (and earlier) to 2024. The length and density of that network is exactly why the signal is so robust: this is not a few noisy stations, it is a coherent regional shift seen across dozens of long records.</p>

            <!-- step marker -->
            <line x1="300" y1="60" x2="300" y2="250" stroke="#FF5C39" stroke-width="1.5" stroke-dasharray="5 4"/>
            <text x="300" y="270" text-anchor="middle" font-size="9" fill="#FF5C39">~mid-1970s step</text>
            <!-- later drier scatter (below baseline) -->
            <polyline points="300,130 340,170 380,165 430,185 480,175 540,190 600,200 670,195 750,210" fill="none" stroke="#2E3192" stroke-width="2.5"/>
            <text x="180" y="90" text-anchor="middle" font-size="10" fill="#1FA9C7" font-weight="600">wetter regime</text>
            <text x="540" y="240" text-anchor="middle" font-size="10" fill="#2E3192" font-weight="600">drier regime (new normal)</text>

      </div>`

    { h: "Why this is chronic risk", body:
      `<p>This is the cleanest example of <span class="kt">chronic physical risk</span> you could ask for. Nothing dramatic happens on any single day — there is no "rainfall decline event" to photograph. Instead the <em>baseline</em> moves, permanently, and every system calibrated to the old baseline (dam yields, water licences, crop varieties, fire schedules) is quietly left out of alignment. That is the defining texture of chronic risk: slow, cumulative, and easy to under-react to precisely because there is no shock.</p>`
    },
    { h: "The consequences", body:
      `<ul class="body-list">
        <li><strong>Water security.</strong> Perth's surface-water dam inflows collapsed by far more than rainfall fell (runoff responds non-linearly — a 15–20% rainfall drop produced a far larger fall in streamflow into dams). The city's response — desalination, groundwater, the move away from rain-fed dams — is a direct adaptation to this trend.</li>
        <li><strong>Agriculture.</strong> The Wheatbelt's cropping calendar is built on cool-season rain. Less reliable rainfall shifts viable crops, planting windows, and land value — a material risk for agribusiness and its lenders.</li>
        <li><strong>Urban supply &amp; planning.</strong> Long-term water planning for a growing Perth has to assume the drier regime is the new normal, not a temporary dry spell.</li>
        <li><strong>Bushfire.</strong> Drier landscapes and longer dry seasons extend the fire-weather window, compounding an acute hazard on top of the chronic one.</li>
      </ul>
      <div class="callout c-mango"><b>How this shows up in client work</b>The clients here aren't only miners — they're water utilities (Water Corporation), state government planners, and the agribusiness/finance sector. A disclosure-readiness or physical-risk engagement for any of them leans on exactly this evidence base.</div>`
    },
    { h: "The two callouts to memorise", body:
      `<div class="callout c-tomato"><b>Strong evidence base</b>The SW WA drying is one of the most thoroughly documented regional climate shifts in the world — decades of dense station data, CSIRO and BOM analysis, and a dedicated research program (the Indian Ocean Climate Initiative). In an interview this is a feature: you can speak about it with confidence because the literature is deep and consistent.</div>
      <div class="callout c-mango"><b>Attribution nuance — know this</b>The <em>decline</em> is not seriously disputed; the <em>full attribution</em> is more nuanced. Part of the variability is driven by large-scale natural modes — the <strong>El Niño–Southern Oscillation (ENSO)</strong> and especially the <strong>Indian Ocean Dipole (IOD)</strong>, plus a southward shift of rain-bearing systems linked to the strengthening of the subtropical ridge. The scientific consensus is that <em>anthropogenic climate change is a major contributor</em> (via circulation changes and the expanding Hadley cell), with natural variability modulating it. If asked, don't overclaim "it's all climate change" — say the trend is robust and human-caused warming is a primary driver, with ocean–atmosphere variability layered on top. That nuance signals real domain literacy.</div>`
    }
  ],

    { q: "An interviewer asks whether the SW WA drying is 'just climate change.' The most domain-literate answer is:", opts: ["Yes, it is entirely caused by anthropogenic climate change", "No, it is entirely natural ENSO/IOD variability", "The decline is robust; human-caused warming is a primary driver, with natural ocean–atmosphere variability (ENSO/IOD) modulating it", "The decline is too uncertain to discuss"], ans: 2, fb: "Correct. The decline itself is well established; attribution is nuanced. Anthropogenic warming (circulation changes, expanding Hadley cell, stronger subtropical ridge) is a primary driver, with ENSO and the IOD layered on top. Holding that nuance is exactly the literacy signal you want to send." }

      `<div class="callout sample"><b>"Tell me about one of your data projects"</b>"I analysed forty years of South Indian Ocean cyclone track data — from the IBTrACS and BOM records — to test how cyclone <em>intensity</em> off WA's north-west has changed from 1985 to 2024. The headline finding matches the IPCC picture: the count is noisy, but the strongest storms are getting stronger, and rapid intensification is cutting warning time. That matters because the Pilbara and Kimberley are a working industrial coastline — ports, rail, LNG — so under AASB S2 those companies now have to make evidenced statements about physical cyclone risk. My contribution was the domain interpretation: framing the data as a defensible, caveated risk statement a consultant could hand a resources client."</div>`

        <b>Data Quality Caveats for This Briefing</b>

/* =========================================================
   STATE
   ========================================================= */
const SK = 'climate_esg_v1';
function loadState() {
  try { const r = localStorage.getItem(SK); if (r) return JSON.parse(r); } catch(e) {}
  return { cur: 0, done: [], answers: {}, view: 'module' };
}
function save(s) { try { localStorage.setItem(SK, JSON.stringify(s)); } catch(e) {} }

let S = loadState();
const contentModuleCount = MODS.filter(m => m.quiz && m.quiz.length).length;
const mcl = document.getElementById('module-count');
if (mcl) mcl.textContent = 'Portfolio Briefing · ' + MODS.length + ' Modules';

/* =========================================================
   RENDER
   ========================================================= */
function renderSidebar() {
  const nav = document.getElementById('module-nav');
  nav.innerHTML = MODS.map(m => {
    const isActive = S.cur === m.id && S.view === 'module';
    const isDone = S.done.includes(m.id);
    let cls = 'nav-item';
    if (isActive) cls += ' active';
    if (isDone) cls += ' done';
    const dot = isDone ? '✓' : (m.id + 1);
    return `<button class="${cls}" onclick="goTo(${m.id})"><span class="nav-dot">${dot}</span><span>${m.titleNav}</span></button>`;
  }).join('');
  const pct = Math.round(S.done.length / MODS.length * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = S.done.length + ' / ' + MODS.length;
}

function renderModule(id) {
  const m = MODS[id];
  const ans = S.answers[id] || {};
  const allDone = m.quiz.every((_, i) => ans[i] !== undefined);
  const isDone = S.done.includes(id);

  const sects = m.sections.map(s => `<div class="section"><h2>${s.h}</h2>${s.body}</div>`).join('');

  const qs = m.quiz.map((q, qi) => {
    const picked = ans[qi];
    const answered = picked !== undefined;
    const opts = q.opts.map((o, oi) => {
      let cls = 'opt';
      if (answered) { if (oi === q.ans) cls += ' correct'; else if (oi === picked) cls += ' wrong'; }
      const ltr = String.fromCharCode(65 + oi);
      return `<button class="${cls}" onclick="answer(${id},${qi},${oi})" ${answered ? 'disabled' : ''}><span class="opt-letter">${ltr}</span>${o}</button>`;
    }).join('');
    const fbCls = answered ? ('feedback show ' + (picked === q.ans ? 'ok' : 'bad')) : 'feedback';
    return `<div class="quiz-q"><p><span class="qn">Q${qi+1}.</span>${q.q}</p><div class="options">${opts}</div><div class="${fbCls}">${answered ? q.fb : ''}</div></div>`;
  }).join('');

  const btnLabel = isDone ? '✓ Module Completed' : (allDone ? 'Mark as Complete →' : 'Answer all questions to continue');
  const prev = id > 0 ? `<button class="nav-btn" onclick="goTo(${id-1})">← Previous</button>` : '';
  const next = id < MODS.length - 1 ? `<button class="nav-btn primary" onclick="goTo(${id+1})">Next Module →</button>` : '';
  const fin = (id === MODS.length - 1 && isDone) ? `<button class="nav-btn primary" onclick="showDone()">View Completion →</button>` : '';

  const objectivesBlock = m.type === 'ref' ? '' :
    `<div class="objectives"><h3>Learning Objectives</h3><ol>${m.objectives.map(o=>`<li>${o}</li>`).join('')}</ol></div>`;

  const bottomBlock = m.type === 'ref'
    ? `<div style="margin-top:40px;padding-top:24px;border-top:1.5px solid var(--line)">
        <button class="complete-btn" onclick="complete(${id})" ${isDone?'disabled':''}>${isDone ? '✓ Completed' : 'Mark as Complete →'}</button>
        <div class="nav-btns" style="margin-top:16px">${prev}${fin}</div>
      </div>`
    : `<div class="quiz-section">
        <div class="quiz-head"><h2>Knowledge Check</h2><span class="quiz-badge">${m.quiz.length} Questions</span></div>
        ${qs}
        <button class="complete-btn" onclick="complete(${id})" ${isDone||!allDone?'disabled':''}>${btnLabel}</button>
        <div class="nav-btns">${prev}${next}${fin}</div>
      </div>`;

  document.getElementById('main').innerHTML = `
    <div class="eyebrow">Module ${m.type === 'ref' ? '08' : String(id+1).padStart(2,'0')} of ${MODS.length}</div>
    <h1 class="mod-title">${m.title}</h1>
    <p class="mod-intro">${m.intro}</p>
    ${objectivesBlock}
    ${sects}
    ${bottomBlock}`;
  document.getElementById('main').scrollTop = 0;
}

function showDone() {
  S.view = 'done'; save(S);
  let correct = 0, total = 0;
  MODS.forEach(m => {
    const ans = S.answers[m.id] || {};
    m.quiz.forEach((q, i) => { total++; if (ans[i] === q.ans) correct++; });
  });
  const pct = total ? Math.round(correct / total * 100) : 0;
  document.getElementById('main').innerHTML = `
    <div class="done-screen">
      <div class="done-badge">🎓</div>
      <h1>Briefing Complete</h1>
      <p>You've worked through all ${contentModuleCount} content modules of the Climate Risk &amp; ESG Data portfolio briefing. You can now speak to each project, its WA relevance, and its AASB S2 connection — go into that interview and own it.</p>
      <div class="score-grid">
        <div class="score-card"><div class="score-num">${S.done.length}</div><div class="score-lbl">Modules</div></div>
        <div class="score-card"><div class="score-num">${correct}</div><div class="score-lbl">Correct</div></div>
        <div class="score-card"><div class="score-num">${total}</div><div class="score-lbl">Questions</div></div>
        <div class="score-card"><div class="score-num">${pct}%</div><div class="score-lbl">Score</div></div>
      </div>
      <button class="complete-btn" onclick="reset()">Start Over</button>
    </div>`;
}

/* ACTIONS */
function goTo(id) { S.cur = id; S.view = 'module'; save(S); renderSidebar(); renderModule(id); }
function answer(modId, qi, oi) { if (!S.answers[modId]) S.answers[modId] = {}; S.answers[modId][qi] = oi; save(S); renderModule(modId); }
function complete(id) { if (!S.done.includes(id)) S.done.push(id); save(S); renderSidebar(); renderModule(id); }
function reset() { S = { cur: 0, done: [], answers: {}, view: 'module' }; save(S); renderSidebar(); renderModule(0); }

/* INIT */
renderSidebar();
if (S.view === 'done') showDone();
else renderModule(S.cur);
</script>
