<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bahasa Hacking — Learn with Adhi</title>
  <script>
    (function(){
      var s=localStorage.getItem('theme');
      var d=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
      document.documentElement.setAttribute('data-theme',s||d);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <script>window.si=window.si||function(){(window.siq=window.siq||[]).push(arguments)};</script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <style>
/* ═══ MENOR DESIGN TOKENS ═══════════════════════════════════════════════ */
:root {
  /* Raw Menor palette */
  --c-hijau:   #19ae5d;
  --c-biru:    #1c5ddc;
  --c-kuning:  #feb52b;
  --c-jingga:  #fc351c;
  --c-pink:    #eb30a2;
  --c-pesisir: #00aaff;
  --c-putih:   #ffffff;

  /* Course identity — K1: Biru Abang + Pink None */
  --c-primary: #feb52b;
  --c-accent:  #eb30a2;
  --c-ink:     #ffffff;

  /* Layout */
  --sidebar-w: 288px;
  --progress-h: 3px;
  --radius-lg: 16px;
  --radius-md: 10px;
  --radius-sm: 6px;

  /* Typography */
  --fs-display: clamp(2rem, 4vw, 3rem);
  --fs-h1: clamp(1.5rem, 3vw, 2rem);
  --fs-h2: clamp(1.2rem, 2.5vw, 1.5rem);
  --fs-h3: 1.1rem;
  --fs-body: 1rem;
  --fs-sm: 0.875rem;
  --fs-xs: 0.75rem;
}

[data-theme="light"] {
  --bg:           #fafaf7;
  --bg-subtle:    #f2f1ec;
  --surface:      #ffffff;
  --surface2:     #f5f4ef;
  --border:       rgba(0,0,0,0.08);
  --border-md:    rgba(0,0,0,0.13);
  --text:         #141419;
  --text-dim:     #5a5b66;
  --text-muted:   #9a9ba6;
  --sidebar-bg:   #f5f4ef;
  --sidebar-text: #141419;
  --code-bg:      #f0efe9;
  --shadow:       0 4px 24px -4px rgba(0,0,0,0.10);
  --shadow-lg:    0 20px 60px -15px rgba(0,0,0,0.12);
  --toggle-track: #e2e2ea;
  --toggle-knob:  #141419;

  /* Dark variants for light mode */
  --c-primary-dim: #1c5ddc;
  --c-accent-dim:  #eb30a2;
  --c-hijau-dim:   #19ae5d;
  --c-kuning-dim:  #feb52b;
  --c-jingga-dim:  #fc351c;
  --c-pesisir-dim: #00aaff;
  --c-pink-dim:    #eb30a2;
}

[data-theme="dark"] {
  --bg:           #0b0b12;
  --bg-subtle:    #12121c;
  --surface:      #17172280;
  --surface2:     #1d1d2a;
  --border:       rgba(255,255,255,0.09);
  --border-md:    rgba(255,255,255,0.15);
  --text:         #ececf0;
  --text-dim:     #9092a3;
  --text-muted:   #555664;
  --sidebar-bg:   #0f0f1a;
  --sidebar-text: #ececf0;
  --code-bg:      #12121c;
  --shadow:       0 4px 24px -4px rgba(0,0,0,0.4);
  --shadow-lg:    0 20px 60px -15px rgba(0,0,0,0.6);
  --toggle-track: #1d1d2a;
  --toggle-knob:  #ececf0;

  /* Lifted Menor colours for dark backgrounds */
  --c-primary-dim: #ffc649;
  --c-accent-dim:  #f054b5;
  --c-hijau-dim:   #2ec272;
  --c-kuning-dim:  #ffc649;
  --c-jingga-dim:  #ff5a43;
  --c-pesisir-dim: #1fbaff;
  --c-pink-dim:    #f054b5;
}

/* ═══ RESET ══════════════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; color-scheme: light dark; }

body {
  font-family: "DM Sans", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: var(--fs-body);
  line-height: 1.7;
  transition: background .3s, color .3s;
  -webkit-tap-highlight-color: transparent;
}

h1, h2, h3 {
  font-family: "DM Serif Display", serif;
  line-height: 1.2;
  letter-spacing: -0.01em;
}

a { color: var(--c-primary-dim); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ═══ SCROLL PROGRESS BAR ════════════════════════════════════════════════ */
#progress-rail {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--progress-h);
  background: var(--border);
  z-index: 300;
}
#progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--c-primary), var(--c-accent));
  transition: width .12s linear;
}

/* ═══ LAYOUT ═════════════════════════════════════════════════════════════ */
.app {
  display: flex;
  min-height: 100vh;
}

/* ─── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 200;
  transition: transform .3s cubic-bezier(.4,0,.2,1), background .3s;
  overflow: hidden;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.brand-icon {
  width: 40px; height: 40px;
  border-radius: var(--radius-md);
  background: var(--c-primary);
  display: grid; place-items: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.brand-name {
  font-size: var(--fs-sm);
  font-weight: 600;
  line-height: 1.3;
  color: var(--sidebar-text);
}
.brand-name small {
  display: block;
  font-size: var(--fs-xs);
  font-weight: 400;
  color: var(--text-muted);
  margin-top: 1px;
}

/* Level tabs */
.level-nav {
  display: flex;
  gap: 6px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.level-tab {
  flex: 1;
  padding: 7px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: "DM Sans", sans-serif;
  font-size: var(--fs-xs);
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .2s;
}
.level-tab.active {
  background: var(--c-primary);
  border-color: var(--c-primary);
  color: #fff;
}
.level-tab:not(.active):hover {
  border-color: var(--c-primary);
  color: var(--c-primary-dim);
}

/* Module list */
.module-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.mod-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .18s;
  text-decoration: none;
}
.mod-item:hover {
  background: var(--surface2);
  border-left-color: var(--border-md);
}
.mod-item.active {
  background: var(--surface2);
  border-left-color: var(--c-primary);
}

.mod-item-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: grid; place-items: center;
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
  color: var(--text-muted);
  transition: background .18s, color .18s;
}
.mod-item.active .mod-item-num {
  background: var(--c-primary);
  border-color: var(--c-primary);
  color: #fff;
}

.mod-item-text {
  flex: 1;
  font-size: var(--fs-sm);
  font-weight: 500;
  color: var(--text-dim);
  line-height: 1.35;
  transition: color .18s;
}
.mod-item.active .mod-item-text { color: var(--text); }

.mod-item-time {
  font-size: 0.68rem;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* Sidebar footer */
.sidebar-footer {
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 10px;
}

.back-link {
  font-size: var(--fs-xs);
  font-weight: 600;
  color: var(--text-dim);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color .2s;
}
.back-link:hover { color: var(--text); text-decoration: none; }

.theme-toggle {
  position: relative;
  width: 46px; height: 24px;
  border-radius: 99px;
  background: var(--toggle-track);
  border: 1px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
  transition: background .3s;
}
.theme-toggle::after {
  content: "";
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--toggle-knob);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
[data-theme="light"] .theme-toggle::after { transform: translateX(22px); }

/* ─── Content area ────────────────────────────────────────────────────── */
.content {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
}

/* Level sections */
.level-section {
  display: none;
  padding-bottom: 80px;
}
.level-section.active { display: block; }

/* Level hero */
.level-hero {
  padding: 56px 48px 48px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, 
    color-mix(in srgb, var(--c-primary) 6%, transparent),
    transparent 60%
  );
  position: relative;
  overflow: hidden;
}
.level-hero::after {
  content: "";
  position: absolute;
  top: -60px; right: -60px;
  width: 240px; height: 240px;
  border-radius: 50%;
  background: var(--c-accent);
  opacity: .04;
  filter: blur(60px);
  pointer-events: none;
}
.level-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: var(--fs-xs);
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--c-primary-dim);
  background: color-mix(in srgb, var(--c-primary) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--c-primary) 25%, transparent);
  border-radius: 99px;
  padding: 4px 12px;
  margin-bottom: 20px;
}
.level-hero h1 {
  font-size: var(--fs-display);
  margin-bottom: 14px;
  max-width: 640px;
}
.level-hero p {
  color: var(--text-dim);
  font-size: clamp(1rem, 2vw, 1.1rem);
  max-width: 560px;
  line-height: 1.7;
}
.level-meta {
  display: flex;
  gap: 20px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.level-meta-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: var(--fs-sm);
  color: var(--text-dim);
}
.level-meta-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--c-primary-dim);
}

/* ═══ MODULE CARD ════════════════════════════════════════════════════════ */
.module {
  --module-accent: var(--c-primary);
  max-width: 820px;
  margin: 32px auto;
  width: calc(100% - 64px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid var(--module-accent);
  border-radius: var(--radius-lg);
  padding: 36px 40px;
  box-shadow: var(--shadow);
  transition: border-color .2s, box-shadow .2s;
}
.module:target,
.module.in-view {
  box-shadow: var(--shadow-lg);
}

.module-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.module-num {
  width: 42px; height: 42px;
  border-radius: 12px;
  background: var(--module-accent);
  color: #fff;
  display: grid; place-items: center;
  font-size: 1rem;
  font-weight: 700;
  flex-shrink: 0;
  font-family: "DM Sans", sans-serif;
}

.module-header h2 {
  flex: 1;
  font-size: var(--fs-h2);
  font-family: "DM Serif Display", serif;
  letter-spacing: -0.01em;
}

.module-time {
  font-size: var(--fs-xs);
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 10px;
  white-space: nowrap;
  flex-shrink: 0;
}

.module > p,
.module > h3,
.module > ul,
.module > ol {
  color: var(--text);
  margin-bottom: 20px;
  max-width: 68ch;
  line-height: 1.75;
}

/* ═══ CONTENT COMPONENTS ════════════════════════════════════════════════ */

/* Analogy box */
.analogy {
  background: color-mix(in srgb, var(--module-accent) 8%, var(--surface2));
  border: 1px solid color-mix(in srgb, var(--module-accent) 20%, transparent);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  margin: 20px 0;
  font-size: var(--fs-sm);
  line-height: 1.7;
  color: var(--text);
}
.analogy.coral {
  background: color-mix(in srgb, var(--c-jingga-dim) 8%, var(--surface2));
  border-color: color-mix(in srgb, var(--c-jingga-dim) 20%, transparent);
}
.analogy strong { color: var(--text); }

/* Key concept */
.key-concept {
  background: color-mix(in srgb, var(--c-primary) 7%, var(--surface));
  border: 1px solid color-mix(in srgb, var(--c-primary) 20%, transparent);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  margin: 24px 0;
}
.key-concept h3 {
  font-size: var(--fs-sm);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--c-primary-dim);
  margin-bottom: 10px;
  font-family: "DM Sans", sans-serif;
}
.key-concept p { color: var(--text-dim); margin-bottom: 0; font-size: var(--fs-sm); }

/* Warning */
.warning {
  background: color-mix(in srgb, var(--c-jingga-dim) 8%, var(--surface2));
  border: 1px solid color-mix(in srgb, var(--c-jingga-dim) 25%, transparent);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  margin: 20px 0;
  font-size: var(--fs-sm);
  color: var(--text);
}
.warning::before { content: "⚠️  "; }

/* Diagram wrapper */
.diagram {
  margin: 24px 0;
  overflow-x: auto;
  border-radius: var(--radius-md);
}
.diagram svg {
  max-width: 100%;
  height: auto;
  display: block;
}

/* Code block */
.code-block, pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  margin: 20px 0;
  overflow-x: auto;
  font-family: "DM Sans", monospace;
  font-size: 0.85rem;
  line-height: 1.65;
  color: var(--text);
}
.code-block.tree { white-space: pre; }
code, .cmd {
  font-family: "DM Sans", monospace;
  font-size: 0.85em;
  background: var(--code-bg);
  border: 1px solid var(--border);
  padding: 2px 7px;
  border-radius: var(--radius-sm);
  color: var(--text);
}
.prompt { color: var(--text-muted); }
.comment { color: var(--text-muted); font-style: italic; }
.str { color: var(--c-hijau-dim); }
.flag { color: var(--c-pesisir-dim); }
.version { display: none; }

/* Command grid */
.cmd-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
  gap: 14px;
  margin: 20px 0;
}
.cmd-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  transition: border-color .18s, transform .18s;
}
.cmd-card:hover {
  border-color: var(--c-primary);
  transform: translateY(-2px);
}
.cmd-name {
  font-family: "DM Sans", monospace;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--c-primary-dim);
  margin-bottom: 6px;
}
.cmd-desc {
  font-size: var(--fs-sm);
  color: var(--text-dim);
  line-height: 1.55;
}

/* Steps */
.steps { margin: 20px 0; }
.step {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.step:last-child { border-bottom: none; }
.step-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--c-primary);
  color: #fff;
  display: grid; place-items: center;
  font-size: 0.75rem;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}

/* Compare / side by side */
.compare, .side-by-side {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 20px 0;
}
@media (max-width: 600px) {
  .compare, .side-by-side { grid-template-columns: 1fr; }
}
table.compare {
  display: table;
  width: 100%;
  border-collapse: collapse;
  table-layout: auto;
  margin: 20px 0;
}
table.compare th,
table.compare td {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  font-size: var(--fs-sm);
  line-height: 1.5;
  min-width: 120px;
}
table.compare th {
  font-weight: 700;
  color: var(--text);
  background: var(--surface2);
}
table.compare tr:last-child td { border-bottom: none; }

/* Checklist */
.checklist { margin: 20px 0; }
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: var(--fs-sm);
  color: var(--text-dim);
}
.check-item:last-child { border-bottom: none; }
.check-item input[type="checkbox"] { display: none; }
.check-item::before {
  content: "○";
  color: var(--c-primary-dim);
  font-size: 1rem;
  flex-shrink: 0;
  margin-top: 1px;
  line-height: 1.2;
}

/* Flow diagram components */
.flow-container {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin: 20px 0;
  padding: 20px;
  background: var(--surface2);
  border-radius: var(--radius-md);
  overflow-x: auto;
}
.flow-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  font-size: var(--fs-sm);
  font-weight: 600;
  text-align: center;
  white-space: nowrap;
}
.flow-box.highlight {
  background: var(--c-primary);
  border-color: var(--c-primary);
  color: #fff;
}
.flow-box.green {
  background: color-mix(in srgb, var(--c-hijau-dim) 12%, var(--surface));
  border-color: color-mix(in srgb, var(--c-hijau-dim) 30%, transparent);
  color: var(--c-hijau-dim);
}
.flow-arrow { color: var(--text-muted); font-size: 1.1rem; flex-shrink: 0; }
.flow-label { font-size: var(--fs-xs); color: var(--text-muted); text-align: center; }

/* File boxes */
.file-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  margin: 12px 0;
}
.file-title {
  font-family: "DM Sans", monospace;
  font-size: 0.82rem;
  font-weight: 600;
  margin-bottom: 6px;
}
.file-ext { color: var(--c-accent-dim); }
.file-desc { font-size: var(--fs-sm); color: var(--text-dim); }

/* Time estimate */
.time-est {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: var(--fs-xs);
  font-weight: 600;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 3px 10px;
  margin-bottom: 20px;
}

/* Quiz */
.quiz {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 24px;
  margin: 24px 0;
}
.quiz h3 {
  font-size: var(--fs-sm);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--c-accent-dim);
  margin-bottom: 14px;
  font-family: "DM Sans", sans-serif;
}
.quiz p { color: var(--text); margin-bottom: 16px; }
.quiz-option {
  display: block;
  width: 100%;
  text-align: left;
  padding: 12px 16px;
  margin-bottom: 8px;
  background: var(--surface);
  border: 1px solid var(--border);

  font-size: var(--fs-sm);
  font-weight: 700;
  cursor: pointer;
  transition: opacity .2s, transform .2s;
}
.btn-next:hover { opacity: .88; transform: translateY(-2px); }

.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 200px), 1fr));
  gap: 14px;
  margin: 20px 0;
}

.hero {
  padding: 0;
  margin-bottom: 20px;

  border-radius: 99px;
  padding: 3px 10px;
  margin-bottom: 14px;

/* Container (inside module) */
.container { max-width: 100%; }

/* Old footer inside modules — hide */
.footer { display: none; }

/* ═══ MOBILE ═════════════════════════════════════════════════════════════ */

  top: 0; left: 0; right: 0;

function render() {

}

function renderTopbar() {
  const maxXP = 1000;
  const pct = Math.min((STATE.xp / maxXP) * 100, 100);
  const level = Math.floor(STATE.xp / 100) + 1;
  return `
    <div class="topbar">

}

function renderScreen() {
  switch (STATE.screen) {

}

// ── DIAGNOSTIC ──
function renderDiagnostic() {
  const step = STATE.diagnosticStep;
  if (step >= DIAGNOSTIC.length) return renderDiagnosticResults();

  const q = DIAGNOSTIC[step];
  const answered = STATE.diagnosticAnswers[step] !== undefined;
  const selected = STATE.diagnosticAnswers[step];

  return `
    <div class="flex-between mb-16">
      <span class="text-sm text-muted">Question ${step + 1} of ${DIAGNOSTIC.length}</span>
      <span class="tag tag-${q.skill}">${q.skill.toUpperCase()}</span>
    </div>
    <div style="height:4px;background:var(--surface2);border-radius:99px;margin-bottom:24px;">
      <div style="height:100%;width:${((step + 1) / DIAGNOSTIC.length) * 100}%;background:var(--accent);border-radius:99px;transition:width .3s;"></div>
    </div>

    <div class="card">
      <h2 style="font-size:18px;margin-bottom:20px;">${q.q}</h2>
      ${q.opts.map((opt, i) => {
        let cls = 'quiz-option';
        if (answered) {
          if (i === q.correct) cls += ' correct';
          else if (i === selected && i !== q.correct) cls += ' wrong';
        }
        return `<button class="${cls}" ${answered ? 'disabled' : ''} onclick="answerDiagnostic(${i})">${opt}</button>`;
      }).join('')}

      ${answered ? `
        <div class="explanation">
          ${selected === q.correct ? '✅ <strong>Correct!</strong>' : '❌ <strong>Not quite.</strong>'}<br><br>
          ${q.explain}
        </div>
        <div class="mt-16" style="text-align:right;">
          <button class="btn btn-primary" onclick="nextDiagnostic()">
            ${step + 1 >= DIAGNOSTIC.length ? 'See Results →' : 'Next Question →'}
          </button>
        </div>
      ` : ''}
    </div>
  `;
}

function renderDiagnosticResults() {
  const score = STATE.diagnosticAnswers.filter((a, i) => a === DIAGNOSTIC[i].correct).length;
  STATE.diagnosticScore = score;
  STATE.diagnosticDone = true;

  const skills = { grammar: 0, vocabulary: 0, reading: 0, listening: 0, speaking: 0, writing: 0 };
  const skillTotal = { grammar: 0, vocabulary: 0, reading: 0, listening: 0, speaking: 0, writing: 0 };
  DIAGNOSTIC.forEach((q, i) => {
    skillTotal[q.skill]++;
    if (STATE.diagnosticAnswers[i] === q.correct) skills[q.skill]++;
  });

  let band = 3.5;
  if (score >= 9) band = 6;
  else if (score >= 7) band = 5.5;
  else if (score >= 5) band = 5;
  else if (score >= 3) band = 4.5;
  else band = 4;

  // Unlock all modules after diagnostic
  STATE.unlockedModules = MODULES.map((_, i) => i);

  return `
    <div class="card text-center">
      <div class="hero-emoji">📊</div>
      <h2>Diagnostic Results</h2>
      <p class="mt-8">You got <strong style="color:var(--accent2)">${score}/10</strong> correct</p>
      <p class="text-sm text-muted">Estimated band: <strong style="font-size:20px;color:${band >= 5.5 ? 'var(--green)' : band >= 5 ? 'var(--orange)' : 'var(--red)'}">${band}</strong></p>
    </div>

    <div class="card">
      <h3>Skill Breakdown</h3>
      <div class="progress-grid mt-16">
        ${Object.entries(skillTotal).filter(([k, v]) => v > 0).map(([skill, total]) => {
          const got = skills[skill];
          const pct = Math.round((got / total) * 100);
          const color = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--orange)' : 'var(--red)';
          return `
            <div class="progress-item">
              <div class="num" style="color:${color}">${pct}%</div>
              <div class="label">${skill.toUpperCase()}</div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="card">
      <h3>Your Priority Fix List</h3>
      <p class="mt-8">${score <= 5 ? `Your biggest gaps are in <strong>grammar</strong> and <strong>vocabulary</strong> — exactly what Module 1 (Indonesian Trap Map) and Module 6 (Vocabulary Power-Ups) target. Start there.` : `Good foundation! Focus on <strong>writing structure</strong> (Module 4) and <strong>speaking fluency</strong> (Module 5) to push past Band 5.`}</p>
      <div class="mt-16">
        <button class="btn btn-primary" onclick="goModules()">Start the Course →</button>
        <button class="btn btn-secondary" onclick="goHome()" style="margin-left:8px;">Back to Home</button>
      </div>
    </div>
  `;
}

  return `
    <div class="flex-between mb-16">

function renderExercise(ex) {
  switch (ex.type) {
    case 'pattern': return renderPatternExercise(ex);
    case 'info': return renderInfoExercise(ex);
    case 'writing-practice': return renderWritingExercise(ex);
    case 'speaking-practice': return renderSpeakingExercise(ex);
    case 'vocab-cards': return renderVocabCards(ex);
    case 'synonym-match': return renderSynonymMatch(ex);
    case 'plan': return renderPlan(ex);
    case 'listening-numbers': return renderListeningNumbers(ex);
    case 'spelling-drill': return renderSpellingDrill(ex);
    default: return renderInfoExercise(ex);
  }
}

function renderSpeakingExercise(ex) {

  const maxTime = phase === 'prep' ? ex.prepTime : ex.speakTime;

  const mins = Math.floor(remaining / 60);
  const secs = remaining % 60;
  const timerClass = remaining <= 10 ? 'danger' : remaining <= 30 ? 'warning' : '';

  return `
    <div class="card">
      <h2>${ex.title}</h2>
      <div class="mt-16" style="background:var(--surface2);padding:20px;border-radius:12px;">
        <p style="font-weight:600;color:var(--accent2);margin-bottom:12px;">📋 ${ex.card.topic}</p>
        <p class="text-sm text-muted">You should say:</p>
        ${ex.card.bullets.map(b => `<p class="text-sm" style="margin-top:4px;">• ${b}</p>`).join('')}
      </div>

      <div class="text-center mt-24">
        <p style="font-weight:600;color:${phase === 'prep' ? 'var(--orange)' : 'var(--green)'}">
          ${phase === 'prep' ? '📝 PREPARATION TIME' : '🎙️ SPEAK NOW'}
        </p>
        <div class="timer-display ${timerClass}">${mins}:${secs.toString().padStart(2, '0')}</div>
        <div style="display:flex;gap:12px;justify-content:center;">
          ${!STATE.speakingRunning ? `
            <button class="btn btn-primary" onclick="startSpeakingTimer(${maxTime})">
              ${phase === 'prep' ? '▶ Start Prep Timer' : '▶ Start Speaking Timer'}
            </button>
          ` : `
            <button class="btn btn-danger" onclick="stopSpeakingTimer()">⏹ Stop</button>
          `}
          ${phase === 'prep' && !STATE.speakingRunning && time === 0 ? '' : `
            ${phase === 'prep' ? `<button class="btn btn-success" onclick="switchToSpeak()">Skip to Speaking →</button>` : ''}
          `}
        </div>
        ${phase === 'speak' && !STATE.speakingRunning && time > 0 ? `
          <div class="mt-16">
            <p class="text-sm text-muted">How did it go? Record yourself next time to hear your mistakes!</p>
            <button class="btn btn-primary mt-8" onclick="nextExercise()">Continue →</button>
          </div>
        ` : ''}
      </div>
    </div>

    <div class="card">
      <h3>Pro Tips While You Speak</h3>
      <p class="text-sm text-muted mt-8">• Don't just list facts — explain WHY and HOW</p>
      <p class="text-sm text-muted mt-8">• Use fillers naturally: "Well...", "Let me think...", "Actually..."</p>
      <p class="text-sm text-muted mt-8">• If you forget a word, describe it: "the thing you use to..." </p>
      <p class="text-sm text-muted mt-8">• Speak at a steady pace — rushing = more mistakes</p>
    </div>
  `;
}

function renderModuleComplete() {
  const m = MODULES[STATE.currentModule];
  if (!STATE.completedModules.includes(STATE.currentModule)) {
    STATE.completedModules.push(STATE.currentModule);
    STATE.xp += 100;
    // Unlock next module
    const next = STATE.currentModule + 1;
    if (next < MODULES.length && !STATE.unlockedModules.includes(next)) {
      STATE.unlockedModules.push(next);
    }
  }
  return `
    <div class="card text-center">
      <div class="hero-emoji">🎉</div>
      <h2>Module Complete!</h2>
      <p class="mt-8">${m.emoji} ${m.title}</p>
      <p class="mt-8" style="color:var(--green);font-weight:600;">+100 XP</p>
      <div class="mt-24">
        <button class="btn btn-primary" onclick="goModules()">Back to Modules</button>
      </div>
    </div>
  `;
}

// ══════════════════════════════════════════════════════
//  ACTIONS
// ══════════════════════════════════════════════════════

function goHome() { STATE.screen = 'home'; render(); }
function goModules() { STATE.screen = 'modules'; render(); }
function startDiagnostic() {
  STATE.screen = 'diagnostic';
  STATE.diagnosticStep = 0;
  STATE.diagnosticAnswers = [];
  render();
}

function answerDiagnostic(i) {
  if (STATE.diagnosticAnswers[STATE.diagnosticStep] !== undefined) return;
  STATE.diagnosticAnswers[STATE.diagnosticStep] = i;
  if (i === DIAGNOSTIC[STATE.diagnosticStep].correct) STATE.xp += 10;
  render();
}

function nextDiagnostic() {
  STATE.diagnosticStep++;
  render();
  window.scrollTo(0, 0);
}

function openModule(i) {
  STATE.currentModule = i;
  STATE.currentExercise = 0;
  STATE.writingText = '';
  STATE.speakingTime = 0;
  STATE.speakingRunning = false;
  STATE.speakingPhase = 'prep';
  STATE.screen = 'module-detail';
  render();
  window.scrollTo(0, 0);
}

function answerExercise(key, selected, correct) {
  if (STATE.exerciseAnswers[key] !== undefined) return;
  STATE.exerciseAnswers[key] = selected;
  if (selected === correct) STATE.xp += 10;
  render();
}

function nextExercise() {
  STATE.currentExercise++;
  STATE.writingText = '';
  STATE.speakingTime = 0;
  STATE.speakingRunning = false;
  STATE.speakingPhase = 'prep';
  render();
  window.scrollTo(0, 0);
}

function updateWriting(val) {
  STATE.writingText = val;
  const wc = val.trim().split(/\s+/).filter(w => w).length;
  const wcEl = document.querySelector('.word-count');
  if (wcEl) {
    wcEl.textContent = `${wc} words ${wc >= 60 && wc <= 80 ? '✅ Good length!' : wc > 80 ? '⚠️ A bit long for one paragraph' : '(aim for 60-80)'}`;
  }
}

function toggleHints() {
  const el = document.getElementById('writing-hints');
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function checkWritingTraps() {
  const text = STATE.writingText.toLowerCase();
  const traps = [];
  if (text.includes('discuss about')) traps.push('🔴 "discuss about" → should be just "discuss"');
  if (text.includes('i am agree')) traps.push('🔴 "I am agree" → should be "I agree"');
  if (text.includes('in this modern era')) traps.push('🟡 "In this modern era" is overused — try "Currently" or "Today"');
  if (text.includes('as we know')) traps.push('🟡 "As we know" — just state your point directly');
  if (text.includes('and etc')) traps.push('🔴 "and etc" → just "etc."');
  if (text.includes('according to me')) traps.push('🔴 "According to me" → "In my opinion" or "I believe"');
  if (text.match(/\b(is|are|am)\s+(agree|understand|know|think)\b/)) traps.push('🔴 Found "be + verb" pattern — remove the "is/am/are"');
  if (!text.match(/\b(the|a|an)\b/) && text.length > 50) traps.push('🟡 No articles found — did you forget "a/an/the"?');
  if (text.match(/\b(furthermore|however|consequently|nevertheless|moreover|in contrast)\b/)) traps.push('🟢 Nice linking words! Band 5.5+ material.');

  const el = document.getElementById('writing-feedback');
  if (el) {
    if (traps.length === 0 && text.length > 20) {
      el.innerHTML = '<div class="explanation" style="border-color:var(--green)">✅ No obvious Indonesian traps detected! Good job. Keep checking for article and tense consistency.</div>';
    } else if (text.length <= 20) {
      el.innerHTML = '<div class="explanation">Write more text first, then check again!</div>';
    } else {
      el.innerHTML = `<div class="explanation">${traps.join('<br>')}</div>`;
    }
  }
}

let speakingInterval = null;
function startSpeakingTimer(maxTime) {
  STATE.speakingRunning = true;
  STATE.speakingTime = 0;
  render();
  speakingInterval = setInterval(() => {
    STATE.speakingTime++;
    const phase = STATE.speakingPhase;
    const ex = MODULES[STATE.currentModule].exercises[STATE.currentExercise];
    const max = phase === 'prep' ? ex.prepTime : ex.speakTime;
    if (STATE.speakingTime >= max) {
      clearInterval(speakingInterval);
      STATE.speakingRunning = false;
      if (phase === 'prep') {
        switchToSpeak();
        return;
      }
    }
    render();
  }, 1000);
}

function stopSpeakingTimer() {
  clearInterval(speakingInterval);
  STATE.speakingRunning = false;
  render();
}

function switchToSpeak() {
  clearInterval(speakingInterval);
  STATE.speakingPhase = 'speak';
  STATE.speakingTime = 0;
  STATE.speakingRunning = false;
  render();
}

function checkSpelling(index, answer) {
  const input = document.getElementById(`spell_${index}`);
  if (!input) return;
  const key = `spell_${STATE.currentModule}_${STATE.currentExercise}_${index}`;
  STATE.exerciseAnswers[key] = input.value;
  render();
}

function attachEvents() {
  // Events are attached inline via onclick
}

// ── INIT ──
render();

  <script>
    (function() {
      var root = document.documentElement;
      var knob = document.getElementById('toggleKnob');
      function applyTheme(t) {
        root.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
        if (knob) knob.style.transform = t === 'light' ? 'translateX(22px)' : 'translateX(0)';
      }
      var saved = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      applyTheme(saved);
      var btn = document.getElementById('themeToggle');
      if (btn) btn.addEventListener('click', function() {
        applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });
    })();
  </script>
