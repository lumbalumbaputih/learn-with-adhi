<html lang="en">
<head>

<script>
  (function() {
    var saved = localStorage.getItem("theme");
    var sys = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Band 7 Precision Lab — IELTS Academic Upgrade</title>
<link rel="icon" href="/assets/favicon-32.png" type="image/png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root[data-theme="light"] {
    --bg: #fafaf7;
    --surface: #ffffff;
    --surface2: #e8effe;
    --accent: #1c5ddc;
    --accent2: #3a79ec;
    --gold: #feb52b;
    --gold2: #ffc649;
    --green: #19ae5d;
    --red: #fc351c;
    --orange: #fc351c;
    --purple: #eb30a2;
    --text: #141419;
    --text2: #5a5b66;
    --border: rgba(0,0,0,0.08);
    --topbar-bg: rgba(250,250,247,0.92);
    --radius: 16px;
    --toggle-track: #e2e2ea;
    --toggle-knob: #141419;
  }
  :root[data-theme="dark"] {
    --bg: #0b0b12;
    --surface: #17172200;
    --surface2: #161e3a;
    --accent: #3a79ec;
    --accent2: #1fbaff;
    --gold: #ffc649;
    --gold2: #feb52b;
    --green: #2ec272;
    --red: #ff5a43;
    --orange: #ff5a43;
    --purple: #f054b5;
    --text: #ececf0;
    --text2: #9092a3;
    --border: rgba(255,255,255,0.10);
    --topbar-bg: rgba(11,11,18,0.88);
    --radius: 16px;
    --toggle-track: #1d1d2a;
    --toggle-knob: #ececf0;
  }
  body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }

  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--topbar-bg, rgba(10,14,26,.88)); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border, rgba(59,130,246,.15));
    padding: 12px 24px; display: flex; align-items: center; justify-content: space-between;
  }
  .topbar h1 { font-size: 17px; font-weight: 800; letter-spacing: -.3px; }
  .topbar h1 span { color: var(--gold); }
  .score-pill { background: var(--surface2); padding: 5px 14px; border-radius: 99px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .score-pill .current { color: var(--text2); }
  .score-pill .arrow { color: var(--gold); }
  .score-pill .target { color: var(--gold); font-weight: 800; }

  .container { max-width: 900px; margin: 0 auto; padding: 24px 16px 100px; }

  .card { background: var(--surface); border: 1px solid var(--border, rgba(59,130,246,.1)); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; transition: transform .2s; }
  .card:hover { transform: translateY(-1px); }
  .card h2 { font-size: 21px; margin-bottom: 8px; letter-spacing: -.3px; }
  .card h3 { font-size: 15px; color: var(--accent2); margin-bottom: 12px; font-weight: 600; }
  .card p { color: var(--text2); margin-bottom: 12px; font-size: 15px; }

  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 22px; border: none; border-radius: 10px; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563eb; transform: scale(1.02); }
  .btn-gold { background: linear-gradient(135deg, var(--gold), #d97706); color: #fff; }
  .btn-gold:hover { transform: scale(1.02); }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-secondary:hover { background: #252d42; }
  .btn-success { background: var(--green); color: #fff; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 8px; }
  .btn:disabled { opacity: .35; cursor: not-allowed; }

  .tabs { display: flex; gap: 4px; margin-bottom: 24px; flex-wrap: wrap; }
  .tab { padding: 9px 18px; border-radius: 10px; background: var(--surface2); color: var(--text2); border: none; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:hover:not(.active) { background: #252d42; color: var(--text); }

  .quiz-option { display: block; width: 100%; padding: 13px 16px; margin-bottom: 8px; background: var(--surface2); border: 2px solid transparent; border-radius: 10px; color: var(--text); font-family: inherit; font-size: 14px; text-align: left; cursor: pointer; transition: all .12s; }
  .quiz-option:hover { border-color: var(--accent); background: #1f2940; }
  .quiz-option.correct { border-color: var(--green); background: rgba(16,185,129,.08); }
  .quiz-option.wrong { border-color: var(--red); background: rgba(239,68,68,.08); }

  .explanation { margin-top: 14px; padding: 16px; background: rgba(59,130,246,.06); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; font-size: 14px; line-height: 1.7; }
  .explanation .b6 { color: var(--orange); font-weight: 600; }
  .explanation .b7 { color: var(--green); font-weight: 600; }

  .progress-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin: 16px 0; }
  .progress-item { background: var(--surface2); border-radius: 10px; padding: 14px; text-align: center; }
  .progress-item .num { font-size: 26px; font-weight: 800; }
  .progress-item .label { font-size: 11px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

  .comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
  .comp-box { padding: 16px; border-radius: 12px; font-size: 14px; line-height: 1.7; }
  .comp-box.b6-box { background: rgba(249,115,22,.06); border: 1px solid rgba(249,115,22,.15); }
  .comp-box.b7-box { background: rgba(16,185,129,.06); border: 1px solid rgba(16,185,129,.15); }
  .comp-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .comp-box.b6-box .comp-label { color: var(--orange); }
  .comp-box.b7-box .comp-label { color: var(--green); }

  .writing-area { width: 100%; min-height: 200px; padding: 16px; background: var(--surface2); border: 2px solid rgba(59,130,246,.15); border-radius: 12px; color: var(--text); font-family: inherit; font-size: 15px; line-height: 1.8; resize: vertical; }
  .writing-area:focus { outline: none; border-color: var(--accent); }
  .writing-area::placeholder { color: var(--text2); }
  .word-count { font-size: 13px; color: var(--text2); margin-top: 8px; text-align: right; }

  .timer-display { font-size: 56px; font-weight: 800; text-align: center; font-variant-numeric: tabular-nums; color: var(--accent2); margin: 16px 0; }
  .timer-display.warning { color: var(--gold); }
  .timer-display.danger { color: var(--red); }

  .module-item { display: flex; align-items: center; gap: 14px; padding: 14px; background: var(--surface2); border-radius: 12px; margin-bottom: 8px; cursor: pointer; transition: all .2s; }
  .module-item:hover { background: #252d42; }
  .module-item.locked { opacity: .35; cursor: not-allowed; }
  .module-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .module-icon.done { background: rgba(16,185,129,.12); color: var(--green); }
  .module-icon.current { background: rgba(59,130,246,.12); color: var(--accent2); }
  .module-icon.locked { background: var(--surface); color: var(--text2); }

  .tag { display: inline-block; padding: 3px 9px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
  .tag-listen { background: rgba(96,165,250,.12); color: var(--accent2); }
  .tag-read { background: rgba(16,185,129,.12); color: var(--green); }
  .tag-write { background: rgba(245,158,11,.12); color: var(--gold); }
  .tag-speak { background: rgba(239,68,68,.12); color: var(--red); }
  .tag-strat { background: rgba(167,139,250,.12); color: var(--purple); }

  .collocation-card { background: var(--surface2); border-radius: 10px; padding: 14px; margin-bottom: 10px; }
  .collocation-card .word { font-size: 17px; font-weight: 700; color: var(--gold2); }
  .collocation-card .wrong-coll { color: var(--red); text-decoration: line-through; font-size: 13px; }
  .collocation-card .right-coll { color: var(--green); font-weight: 600; font-size: 13px; }

  .divider { height: 1px; background: rgba(255,255,255,.04); margin: 20px 0; }
  .hero-emoji { font-size: 44px; margin-bottom: 10px; }
  .fade-in { animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .flex-between { display: flex; justify-content: space-between; align-items: center; }
  .flex-center { display: flex; align-items: center; gap: 8px; }
  .mt-8 { margin-top: 8px; } .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; }
  .mb-8 { margin-bottom: 8px; } .mb-16 { margin-bottom: 16px; }
  .text-sm { font-size: 13px; } .text-muted { color: var(--text2); } .text-center { text-align: center; }

  .highlight-strip { padding: 3px 7px; border-radius: 4px; font-weight: 600; font-size: 13px; }
  .hl-green { background: rgba(16,185,129,.12); color: var(--green); }
  .hl-red { background: rgba(239,68,68,.12); color: var(--red); }
  .hl-gold { background: rgba(245,158,11,.12); color: var(--gold); }

  @media (max-width: 600px) {
    .comparison { grid-template-columns: 1fr; }
    .progress-grid { grid-template-columns: repeat(2, 1fr); }
    .tab { padding: 7px 12px; font-size: 11px; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
// ══════════════════════════════════════════════════
//  BAND 7 PRECISION LAB
// ══════════════════════════════════════════════════

const S = {
  screen: 'home',
  xp: 0,
  dStep: 0,
  dAnswers: [],
  dDone: false,
  dScore: null,
  curMod: null,
  curEx: 0,
  exAns: {},
  writingText: '',
  speakPhase: 'prep',
  speakTime: 0,
  speakRunning: false,
  completedMods: [],
  unlockedMods: [0],
};

// ── DIAGNOSTIC: BAND 6 vs 7 PRECISION ──
const DIAG = [
  {
    q: "Which sentence uses a LESS COMMON collocation correctly?",
    opts: [
      "The government made a decision to increase taxes.",
      "The government reached a decision to raise taxes.",
      "The government did a decision to increase taxes.",
      "The government took a decision to make taxes higher."
    ],
    correct: 1,
    explain: `<span class="b6">"Made a decision"</span> is fine but common (Band 6). <span class="b7">"Reached a decision"</span> is a stronger collocation that shows range. "Did a decision" is just wrong. At Band 7, examiners look for LESS COMMON but NATURAL word combinations.`,
    cat: 'vocab'
  },
  {
    q: "Choose the sentence with the best COHESION (linking between ideas):",
    opts: [
      "Many people work from home. It saves time. Companies like it too.",
      "Many people work from home because it saves commuting time, and this flexibility tends to benefit employers as well.",
      "Many people work from home. Moreover, it saves time. Furthermore, companies like it too.",
      "Many people work from home, saving time, and companies like it."
    ],
    correct: 1,
    explain: `Band 6 = linking words everywhere ("Moreover, Furthermore"). Band 7 = ideas flow NATURALLY with subordinate clauses, relative clauses, and logical connectors that don't feel forced. Option B uses <span class="b7">"because"</span>, <span class="b7">"and this flexibility tends to"</span> — smooth, not mechanical.`,
    cat: 'writing'
  },
  {
    q: "What's wrong with: 'The chart illustrates the amount of people who used public transport.'",
    opts: [
      "Nothing, it's correct",
      "'Amount' should be 'number' (people are countable)",
      "'Illustrates' should be 'shows'",
      "'Who' should be 'that'"
    ],
    correct: 1,
    explain: `<span class="b7">"Number"</span> for countable nouns (people, cars, books). <span class="b6">"Amount"</span> for uncountable nouns (water, money, time). This distinction is a classic Band 6→7 separator in Task 1. Examiners notice it immediately.`,
    cat: 'writing'
  },
  {
    q: "In IELTS Reading, a 'matching headings' question says the answer is in Paragraph C. You find a sentence that partly matches. What do you do?",
    opts: [
      "Choose it — partial match is good enough",
      "Read the WHOLE paragraph to check if the heading captures the MAIN idea, not just a detail",
      "Look for exact word matches between heading and paragraph",
      "Skip it and come back later"
    ],
    correct: 1,
    explain: `Band 6 readers match keywords. Band 7 readers understand that headings must capture the <span class="b7">main idea of the ENTIRE paragraph</span>, not just one sentence. A detail in Paragraph C might match a heading, but if the paragraph is mostly about something else, that heading is wrong.`,
    cat: 'reading'
  },
  {
    q: "You hear a speaker say: 'Well, initially I thought it was going to be straightforward, but actually, it turned out to be far more complex than anyone had anticipated.' What is the speaker's main point?",
    opts: [
      "The task was easy",
      "The task was unexpectedly difficult",
      "Nobody wanted to do the task",
      "The task is still ongoing"
    ],
    correct: 1,
    explain: `Band 7 listening requires tracking <span class="b7">discourse shifts</span>: "initially I thought... BUT actually... far more complex than anticipated." The speaker CORRECTS their initial impression. Band 6 candidates sometimes latch onto "straightforward" and pick the wrong answer.`,
    cat: 'listening'
  },
  {
    q: "Which sentence shows GRAMMATICAL RANGE (a Band 7 requirement)?",
    opts: [
      "People should exercise. It is good for health. They will feel better.",
      "If people exercised regularly, they would likely experience significant improvements in both physical and mental well-being.",
      "People who exercise they feel better because exercise is good.",
      "Exercising is very very important for people who want good health."
    ],
    correct: 1,
    explain: `Band 7 = <span class="b7">complex structures used accurately</span>. Option B uses a conditional ("If people exercised...would likely"), an adverb ("regularly"), and parallel structure ("both physical and mental"). Band 6 tends to use only simple and compound sentences.`,
    cat: 'grammar'
  },
  {
    q: "In Speaking Part 3, the examiner asks: 'Do you think technology will replace teachers?' Which response is Band 7?",
    opts: [
      "Yes, I think so because technology is very advanced now.",
      "No, I don't think so. Teachers are important.",
      "That's an interesting question. I think technology will certainly play a larger role in education, but I doubt it could fully replace teachers, particularly when it comes to things like emotional support and critical thinking, which require a human element.",
      "I am not sure about this topic."
    ],
    correct: 2,
    explain: `Band 7 Speaking Part 3 needs: <span class="b7">extended answers, hedging language</span> ("I doubt", "particularly when it comes to"), <span class="b7">specific examples or reasoning</span>, and <span class="b7">discourse markers</span> that feel natural. Band 6 gives opinions without developing them.`,
    cat: 'speaking'
  },
  {
    q: "In Task 1 Academic, what does 'selecting key features' mean?",
    opts: [
      "Describe every single data point in the chart",
      "Pick only the most significant trends, comparisons, or changes and describe those",
      "Just describe the highest and lowest values",
      "Write about what might happen in the future based on the data"
    ],
    correct: 1,
    explain: `Band 6 writers describe everything (data dump). Band 7 writers <span class="b7">select and highlight the most significant features</span>: main trends, notable exceptions, key comparisons. This is literally 25% of your Task 1 score (Task Achievement). Don't describe every number — analyse.`,
    cat: 'writing'
  },
  {
    q: "Which sentence correctly uses a PARTICIPLE CLAUSE (a Band 7 grammar feature)?",
    opts: [
      "Having completed the project, the team celebrated their success.",
      "The team completed the project and they celebrated.",
      "The project was completed and the team celebrated.",
      "After the team was completing the project they celebrated."
    ],
    correct: 0,
    explain: `<span class="b7">"Having completed..."</span> is a perfect participle clause — it shows one action finished before another. This is a Band 7 grammar structure. Band 6 would write "After they completed the project, they celebrated" which is correct but simpler.`,
    cat: 'grammar'
  },
  {
    q: "What is the BIGGEST difference between Band 6 and Band 7 in Writing?",
    opts: [
      "Band 7 writes longer essays",
      "Band 7 uses bigger words",
      "Band 7 presents a clear position throughout with well-supported ideas and fewer errors",
      "Band 7 uses more linking words"
    ],
    correct: 2,
    explain: `The real gap: Band 7 = <span class="b7">clear position THROUGHOUT</span> (not just in the conclusion), <span class="b7">well-extended ideas</span> (not just stated), and errors that are <span class="b7">rare and don't impede communication</span>. It's not about length or fancy words — it's about clarity, development, and accuracy.`,
    cat: 'writing'
  },
];

// ── MODULES ──
const MODS = [
  {
    id: 0, title: "The Band 6→7 Gap Analysis", emoji: "🔬", tag: "strat", tagLabel: "STRATEGY",
    desc: "Understand exactly what examiners look for at Band 7 that Band 6 doesn't deliver.", duration: "15 min",
    exercises: [
      {
        type: 'info', title: 'What Band 7 Actually Means',
        content: `
          <p>Band 7 isn't "better Band 6." It's a qualitative shift. Here's what the examiner is checking:</p>
          <div class="comparison mt-16">
            <div class="comp-box b6-box">
              <div class="comp-label">Band 6 — Competent</div>
              <p>✓ Generally effective communication</p>
              <p>✓ Uses linking words (sometimes mechanically)</p>
              <p>✓ Adequate vocabulary for the task</p>
              <p>✓ Mix of simple and complex sentences</p>
              <p>✓ Errors occur but meaning is clear</p>
            </div>
            <div class="comp-box b7-box">
              <div class="comp-label">Band 7 — Good</div>
              <p>✓ Presents a clear position <strong>throughout</strong></p>
              <p>✓ Ideas flow <strong>logically without forced linking</strong></p>
              <p>✓ Uses <strong>less common vocabulary</strong> with awareness of collocation</p>
              <p>✓ <strong>Variety</strong> of complex structures, <strong>majority error-free</strong></p>
              <p>✓ Errors are <strong>rare</strong> and don't impede</p>
            </div>
          </div>
          <p class="mt-16">The four killers that keep people at Band 6:</p>
          <p class="mt-8"><strong style="color:var(--gold)">1. Collocation errors</strong> — Using words that don't naturally go together</p>
          <p class="mt-8"><strong style="color:var(--gold)">2. Mechanical cohesion</strong> — "Firstly... Secondly... Moreover..." without real flow</p>
          <p class="mt-8"><strong style="color:var(--gold)">3. Underdeveloped ideas</strong> — Stating opinions without explaining WHY</p>
          <p class="mt-8"><strong style="color:var(--gold)">4. Grammar ceiling</strong> — Only using simple + compound sentences, never conditionals, passives, cleft sentences, participle clauses</p>
        `
      },
      {
        type: 'info', title: 'The 4-Week Strategy',
        content: `
          <p>Band 7 is achievable from 6 in <strong>6-10 weeks</strong> of focused daily practice. Here's the formula:</p>
          <div style="margin:16px 0;padding:18px;background:var(--surface2);border-radius:12px;">
            <p><strong style="color:var(--accent2)">Week 1-2:</strong> Collocation mastery + Grammar range upgrade</p>
            <p class="mt-8"><strong style="color:var(--accent2)">Week 3-4:</strong> Writing precision (Task 1 data language + Task 2 argument structure)</p>
            <p class="mt-8"><strong style="color:var(--accent2)">Week 5-6:</strong> Speaking fluency + Reading speed under pressure</p>
            <p class="mt-8"><strong style="color:var(--accent2)">Week 7+:</strong> Full practice tests under timed conditions, error analysis</p>
          </div>
          <p>This course front-loads the <strong>highest-impact changes</strong>: the things that move your score the fastest.</p>
        `
      }
    ]
  },
  {
    id: 1, title: "Collocation Surgery", emoji: "🔗", tag: "strat", tagLabel: "VOCABULARY",
    desc: "The #1 thing that separates Band 6 from Band 7: natural word combinations.", duration: "25 min",
    exercises: [
      {
        type: 'info', title: 'Why Collocations Matter So Much',
        content: `
          <p>A Band 6 candidate might write: <span class="hl-red highlight-strip">"do a big effect"</span></p>
          <p class="mt-8">A Band 7 candidate writes: <span class="hl-green highlight-strip">"have a significant impact"</span></p>
          <p class="mt-16">Both mean the same thing. But "have an impact" is a <strong>natural collocation</strong> — words that native speakers automatically pair together. "Do an effect" sounds wrong even though the grammar is fine. This is what the band descriptor means by <strong>"awareness of style and collocation."</strong></p>
          <p class="mt-16">The good news: there are only about 50-60 collocations that appear frequently in IELTS topics. Master those, and your Lexical Resource score jumps.</p>
        `
      },
      {
        type: 'collocation-quiz', title: 'Collocation Precision Drill',
        instruction: 'Choose the natural collocation. Both options are grammatically correct — only one sounds natural.',
        items: [
          { stem: '___ a decision', opts: ['Make', 'Do'], correct: 0, explain: 'MAKE a decision (not "do"). But: DO research, DO homework, DO business.' },
          { stem: '___ an important role', opts: ['Make', 'Play'], correct: 1, explain: 'PLAY a role / PLAY a part. Never "make a role."' },
          { stem: '___ attention to', opts: ['Pay', 'Give'], correct: 0, explain: 'PAY attention to. You can "give attention" but "pay attention" is the standard collocation for IELTS.' },
          { stem: 'a ___ increase', opts: ['strong', 'sharp'], correct: 1, explain: 'A SHARP increase/decrease/rise/fall. "Strong" works with "performance" or "economy" but not with statistical changes.' },
          { stem: '___ measures', opts: ['Take', 'Make'], correct: 0, explain: 'TAKE measures (to solve a problem). Also: take action, take steps, take responsibility.' },
          { stem: '___ the gap between', opts: ['Bridge', 'Close'], correct: 0, explain: 'BRIDGE the gap (figurative). You can also "narrow" the gap. "Close the gap" works but "bridge" is more sophisticated.' },
          { stem: '___ into account', opts: ['Take', 'Put'], correct: 0, explain: 'TAKE into account / TAKE into consideration. This is essential for Task 2 discussion essays.' },
          { stem: '___ a challenge', opts: ['Face', 'Meet'], correct: 0, explain: 'FACE a challenge / POSE a challenge. Both work but "face" is more common in IELTS contexts.' },
        ]
      },
      {
        type: 'info', title: 'The Collocation Families',
        content: `
          <p>IELTS topics repeat. These collocation families cover 80% of what you'll need:</p>
          <div class="collocation-card mt-16">
            <div class="word">MAKE vs DO</div>
            <p class="text-sm mt-8"><strong>MAKE:</strong> a decision, progress, an effort, a contribution, a mistake, a comparison, an impact</p>
            <p class="text-sm mt-8"><strong>DO:</strong> research, damage, harm, business, work, exercise, a task</p>
          </div>
          <div class="collocation-card">
            <div class="word">Data Description (Task 1)</div>
            <p class="text-sm mt-8"><span class="right-coll">sharp increase</span> · <span class="right-coll">gradual decline</span> · <span class="right-coll">peaked at</span> · <span class="right-coll">remained stable</span> · <span class="right-coll">fluctuated between</span> · <span class="right-coll">stood at</span> · <span class="right-coll">accounted for</span></p>
          </div>

//  RENDER ENGINE

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `${renderTopbar()}<div class="container fade-in">${renderScreen()}</div>`;
}

function renderTopbar() {
  const lvl = Math.floor(S.xp / 150) + 1;
  const pct = Math.min((S.xp / 1500) * 100, 100);
  return `<div class="topbar">
    <h1>🎯 Band 7 <span>Precision Lab</span></h1>
    <div style="display:flex;align-items:center;gap:16px;">
      <div class="score-pill"><span class="current">6.0</span><span class="arrow">→</span><span class="target">7.0</span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:80px;height:6px;background:var(--surface2);border-radius:99px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:99px;transition:width .5s;"></div>
        </div>
        <span style="font-size:11px;color:var(--text2);font-weight:600;">Lvl ${lvl}</span>
      </div>
    </div>
  </div>`;
}

function renderScreen() {
  switch(S.screen) {
    case 'home': return renderHome();
    case 'diagnostic': return renderDiag();
    case 'modules': return renderMods();
    case 'module-detail': return renderModDetail();
    default: return renderHome();
  }
}

function renderHome() {
  return `
    <div class="text-center" style="padding:36px 0 16px">

      <p style="color:var(--text2);max-width:520px;margin:0 auto;">You're already competent. Now it's about <strong>precision</strong> — collocations, grammar range, argument structure, and the subtle things that push a 6.0 to a 7.0 in IELTS Academic.</p>
    </div>
    <div class="card" style="text-align:center;border-color:rgba(245,158,11,.2);">
      <h3 style="color:var(--gold);">🧪 Diagnostic: Are You Band 6 or Already Close to 7?</h3>
      <p>10 precision questions testing the exact skills that separate the two bands.</p>
      <button class="btn btn-gold" onclick="startDiag()">Take the Diagnostic →</button>
      ${S.dDone ? `<p class="mt-8 text-sm" style="color:var(--green)">✓ Done! Score: ${S.dScore}/10</p>` : ''}
    </div>
    ${S.dDone ? `<div class="card" style="text-align:center;"><h3>📚 Course Modules</h3><p>9 modules targeting every Band 7 criterion.</p><button class="btn btn-primary" onclick="goMods()">Open Modules →</button></div>` : ''}
    <div class="card">
      <h3>The Band 6→7 Reality</h3>
      <div class="comparison mt-16">
        <div class="comp-box b6-box">
          <div class="comp-label">What Band 6 looks like</div>
          <p>Uses linking words but sometimes mechanically. Vocabulary is adequate but not precise. Grammar is a mix of simple and complex, with noticeable errors. Ideas are relevant but underdeveloped. Can discuss topics but lacks depth in speaking.</p>
        </div>
        <div class="comp-box b7-box">
          <div class="comp-label">What Band 7 requires</div>
          <p>Ideas flow logically without forcing connectors. Uses less common vocabulary with collocation awareness. Complex grammar used flexibly with majority of sentences error-free. Arguments are well-supported with relevant examples. Speaks fluently with natural discourse markers and hedging.</p>
        </div>
      </div>
    </div>
    <div class="card">
      <h3>What This Course Covers</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-top:16px;">
        <div><strong style="color:var(--gold)">🔗 Collocations</strong><p class="text-sm text-muted mt-8">The #1 vocabulary gap. Learn natural word pairings.</p></div>
        <div><strong style="color:var(--accent2)">⚙️ Grammar Range</strong><p class="text-sm text-muted mt-8">5 structures that signal Band 7 to examiners.</p></div>
        <div><strong style="color:var(--green)">✍️ Writing Precision</strong><p class="text-sm text-muted mt-8">Task 1 data language + Task 2 argument architecture.</p></div>
        <div><strong style="color:var(--red)">🎤 Speaking Depth</strong><p class="text-sm text-muted mt-8">Part 3 extended answers with PEEC framework.</p></div>
      </div>
    </div>
  `;
}

// ── DIAGNOSTIC ──
function renderDiag() {
  if (S.dStep >= DIAG.length) return renderDiagResults();
  const q = DIAG[S.dStep];
  const answered = S.dAnswers[S.dStep] !== undefined;
  const sel = S.dAnswers[S.dStep];
  return `
    <div class="flex-between mb-16">
      <span class="text-sm text-muted">Question ${S.dStep+1} / ${DIAG.length}</span>
      <span class="tag tag-${q.cat === 'vocab' ? 'strat' : q.cat === 'grammar' ? 'strat' : q.cat === 'writing' ? 'write' : q.cat === 'reading' ? 'read' : q.cat === 'listening' ? 'listen' : 'speak'}">${q.cat.toUpperCase()}</span>
    </div>
    <div style="height:4px;background:var(--surface2);border-radius:99px;margin-bottom:20px;">
      <div style="height:100%;width:${((S.dStep+1)/DIAG.length)*100}%;background:var(--gold);border-radius:99px;transition:width .3s;"></div>
    </div>
    <div class="card">
      <h2 style="font-size:17px;margin-bottom:18px;">${q.q}</h2>
      ${q.opts.map((o,i) => {
        let c = 'quiz-option';
        if (answered) { if (i===q.correct) c+=' correct'; else if (i===sel&&i!==q.correct) c+=' wrong'; }
        return `<button class="${c}" ${answered?'disabled':''} onclick="aDiag(${i})">${o}</button>`;
      }).join('')}
      ${answered ? `<div class="explanation">${sel===q.correct?'✅ <strong>Correct!</strong>':'❌ <strong>Not quite.</strong>'}<br><br>${q.explain}</div>
      <div class="mt-16" style="text-align:right;"><button class="btn btn-primary" onclick="nDiag()">${S.dStep+1>=DIAG.length?'See Results →':'Next →'}</button></div>` : ''}
    </div>
  `;
}

function renderDiagResults() {
  const score = S.dAnswers.filter((a,i) => a===DIAG[i].correct).length;
  S.dScore = score; S.dDone = true;
  S.unlockedMods = MODS.map((_,i)=>i);
  const cats = {}; const catT = {};
  DIAG.forEach((q,i) => { catT[q.cat]=(catT[q.cat]||0)+1; if(S.dAnswers[i]===q.correct) cats[q.cat]=(cats[q.cat]||0)+1; });
  let est = score >= 9 ? '7.0+' : score >= 7 ? '6.5-7.0' : score >= 5 ? '6.0-6.5' : '5.5-6.0';
  return `
    <div class="card text-center">
      <div class="hero-emoji">📊</div>
      <h2>Diagnostic Results</h2>
      <p class="mt-8"><strong style="color:var(--accent2);font-size:24px;">${score}/10</strong></p>
      <p class="text-sm text-muted">Estimated readiness: <strong style="color:var(--gold);font-size:18px;">${est}</strong></p>
    </div>
    <div class="card">
      <h3>Skill Breakdown</h3>
      <div class="progress-grid mt-16">
        ${Object.entries(catT).map(([cat,total]) => {
          const got = cats[cat]||0;
          const pct = Math.round((got/total)*100);
          const col = pct>=70?'var(--green)':pct>=40?'var(--gold)':'var(--red)';
          return `<div class="progress-item"><div class="num" style="color:${col}">${pct}%</div><div class="label">${cat}</div></div>`;
        }).join('')}
      </div>
    </div>
    <div class="card">
      <h3>Priority Actions</h3>
      ${score <= 6 ? `<p class="mt-8">Your main gaps are in <strong>collocations and grammar range</strong>. Start with Module 2 (Collocation Surgery) and Module 3 (Grammar Upgrade) — these have the fastest impact on your score.</p>` :
        `<p class="mt-8">You're close to Band 7 already. Focus on <strong>writing structure</strong> (Modules 4-5) and <strong>speaking depth</strong> (Module 7) to lock it in.</p>`}
      <div class="mt-16">
        <button class="btn btn-gold" onclick="goMods()">Start the Course →</button>
        <button class="btn btn-secondary" onclick="goHome()" style="margin-left:8px;">Home</button>
      </div>
    </div>
  `;
}

// ── MODULES LIST ──
function renderMods() {
  return `
    <div class="flex-between mb-16"><h2>Course Modules</h2><button class="btn btn-secondary btn-sm" onclick="goHome()">← Home</button></div>
    ${MODS.map((m,i) => {
      const done = S.completedMods.includes(i);
      const unlocked = S.unlockedMods.includes(i);
      return `<div class="module-item ${unlocked?'':'locked'}" onclick="${unlocked?`openMod(${i})`:''}">
        <div class="module-icon ${done?'done':unlocked?'current':'locked'}">${done?'✓':m.emoji}</div>
        <div style="flex:1"><h4 style="font-size:14px;font-weight:600;">${m.title}</h4><p style="font-size:12px;color:var(--text2);">${m.desc}</p></div>
        <div><span class="tag tag-${m.tag}">${m.tagLabel}</span><p class="text-sm text-muted mt-8">${m.duration}</p></div>
      </div>`;
    }).join('')}
  `;
}

// ── MODULE DETAIL ──
function renderModDetail() {
  const m = MODS[S.curMod];
  const ex = m.exercises[S.curEx];
  if (!ex) return renderModComplete();
  return `
    <div class="flex-between mb-16">
      <div><button class="btn btn-secondary btn-sm" onclick="goMods()">← Modules</button><span class="text-sm text-muted" style="margin-left:12px;">${m.emoji} ${m.title}</span></div>
      <span class="text-sm text-muted">${S.curEx+1} / ${m.exercises.length}</span>
    </div>
    <div style="height:4px;background:var(--surface2);border-radius:99px;margin-bottom:20px;">
      <div style="height:100%;width:${((S.curEx+1)/m.exercises.length)*100}%;background:var(--accent);border-radius:99px;transition:width .3s;"></div>
    </div>
    ${renderEx(ex)}
  `;
}

function renderEx(ex) {
  switch(ex.type) {
    case 'info': return renderInfo(ex);
    case 'collocation-quiz': return renderCollQuiz(ex);
    case 'grammar-transform': return renderGrammarTransform(ex);
    case 'writing-practice': return renderWriting(ex);
    case 'speaking-practice': return renderSpeaking(ex);
    case 'speaking-model': return renderSpeakingModel(ex);
    case 'rewrite-drill': return renderRewriteDrill(ex);
    case 'reading-strategy': return renderReadingStrategy(ex);
    case 'plan': return renderPlan(ex);
    default: return renderInfo(ex);
  }
}

function renderInfo(ex) {
  return `<div class="card"><h2>${ex.title}</h2><div class="mt-16">${ex.content}</div><div class="mt-24" style="text-align:right;"><button class="btn btn-primary" onclick="nextEx()">Got It →</button></div></div>`;
}

function renderCollQuiz(ex) {
  return `<div class="card"><h2>${ex.title}</h2><p class="text-muted mb-16">${ex.instruction}</p>
    ${ex.items.map((item,ii) => {
      const key = `coll_${S.curMod}_${S.curEx}_${ii}`;
      const ans = S.exAns[key]; const done = ans!==undefined;
      return `<div style="margin-bottom:14px;padding:14px;background:var(--surface2);border-radius:10px;">
        <p style="font-weight:600;margin-bottom:8px;">${item.stem}</p>
        <div style="display:flex;gap:8px;">
          ${item.opts.map((o,oi) => {
            let c = 'btn btn-sm btn-secondary';
            if (done && oi===item.correct) c='btn btn-sm btn-success';
            else if (done && oi===ans && oi!==item.correct) c='btn btn-sm btn-danger';
            return `<button class="${c}" ${done?'disabled':''} onclick="aEx('${key}',${oi},${item.correct})">${o}</button>`;
          }).join('')}
        </div>
        ${done?`<p class="text-sm text-muted mt-8">💡 ${item.explain}</p>`:''}
      </div>`;
    }).join('')}
    <div style="text-align:right;"><button class="btn btn-primary" onclick="nextEx()">Continue →</button></div>
  </div>`;
}

function renderGrammarTransform(ex) {
  const key = `gram_${S.curMod}_${S.curEx}`;
  const ans = S.exAns[key]; const done = ans!==undefined;
  return `
    <div class="card">
      <h2>${ex.title}</h2>
      <div class="comparison mt-16">
        <div class="comp-box b6-box"><div class="comp-label">Band 6</div><p>"${ex.b6}"</p></div>
        <div class="comp-box b7-box"><div class="comp-label">Band 7</div><p>"${ex.b7}"</p></div>
      </div>
      <div class="explanation mt-16">${ex.explain}</div>
    </div>
    <div class="card">
      <h3>Your Turn</h3>
      <p class="mb-16">${ex.practice.q}</p>
      ${ex.practice.opts.map((o,i) => {
        let c = 'quiz-option';
        if (done) { if (i===ex.practice.correct) c+=' correct'; else if (i===ans&&i!==ex.practice.correct) c+=' wrong'; }
        return `<button class="${c}" ${done?'disabled':''} onclick="aEx('${key}',${i},${ex.practice.correct})">${o}</button>`;
      }).join('')}
      ${done?`<div class="explanation">${ans===ex.practice.correct?'✅ ':'❌ '}${ex.practice.why}</div>`:''}
      ${done?`<div class="mt-16" style="text-align:right;"><button class="btn btn-primary" onclick="nextEx()">Continue →</button></div>`:''}
    </div>
  `;
}

function renderWriting(ex) {
  const wc = S.writingText.trim().split(/\s+/).filter(w=>w).length;
  return `<div class="card">
    <h2>${ex.title}</h2>
    <p class="mt-8" style="color:var(--gold);font-weight:600;">${ex.prompt}</p>
    <p class="mt-8 text-muted">${ex.instruction}</p>
    <div class="mt-16" style="background:var(--surface2);padding:14px;border-radius:10px;">
      <p class="text-sm" style="color:var(--accent2);font-weight:600;">💡 Hints</p>
      <div id="whints" style="display:none;margin-top:8px;">
        ${ex.hints.map(h=>`<p class="text-sm text-muted" style="margin-top:4px;">• ${h}</p>`).join('')}
      </div>
      <button class="btn btn-secondary btn-sm mt-8" onclick="document.getElementById('whints').style.display=document.getElementById('whints').style.display==='none'?'block':'none'">Show/Hide</button>
    </div>
    <textarea class="writing-area mt-16" placeholder="Start writing..." oninput="S.writingText=this.value;document.getElementById('wc').textContent=this.value.trim().split(/\\s+/).filter(w=>w).length+' words';">${S.writingText}</textarea>
    <div class="word-count" id="wc">${wc} words</div>

      <button class="btn btn-primary" onclick="nextEx()">Continue →</button>
    </div>
    <div id="wfeedback" class="mt-16"></div>
  </div>`;

function renderSpeaking(ex) {
  const ph = S.speakPhase;
  const max = ph==='prep'?ex.prepTime:ex.speakTime;
  const rem = max - S.speakTime;
  const m = Math.floor(rem/60); const s = rem%60;
  const tc = rem<=5?'danger':rem<=15?'warning':'';
  return `<div class="card">
    <h2>${ex.title}</h2>
    <div class="mt-16" style="background:var(--surface2);padding:18px;border-radius:10px;">
      <p style="font-weight:600;color:var(--gold);margin-bottom:10px;">📋 ${ex.card.topic}</p>
      ${ex.card.bullets.map(b=>`<p class="text-sm" style="margin-top:4px;">• ${b}</p>`).join('')}
    </div>
    <div class="text-center mt-24">
      <p style="font-weight:600;color:${ph==='prep'?'var(--gold)':'var(--green)'}">${ph==='prep'?'📝 PREP TIME':'🎙️ SPEAK NOW'}</p>
      <div class="timer-display ${tc}">${m}:${s.toString().padStart(2,'0')}</div>
      <div style="display:flex;gap:10px;justify-content:center;">
        ${!S.speakRunning?`<button class="btn btn-primary" onclick="startTimer(${max})">${ph==='prep'?'▶ Start Prep':'▶ Start Speaking'}</button>`
          :`<button class="btn btn-danger" onclick="stopTimer()">⏹ Stop</button>`}
        ${ph==='prep'&&!S.speakRunning&&S.speakTime>0?`<button class="btn btn-success" onclick="toSpeak()">Skip to Speaking →</button>`:''}
        ${ph==='prep'&&!S.speakRunning&&S.speakTime===0?`<button class="btn btn-secondary" onclick="toSpeak()">Skip Prep</button>`:''}
      </div>
      ${ph==='speak'&&!S.speakRunning&&S.speakTime>0?`<div class="mt-16"><p class="text-sm text-muted">Self-assess: Did you use hedging? Discourse markers? Specific examples?</p><button class="btn btn-primary mt-8" onclick="nextEx()">Continue →</button></div>`:''}
    </div>
  </div>`;
}

function renderSpeakingModel(ex) {
  return `<div class="card">
    <h2>${ex.title}</h2>
    <p style="font-weight:600;color:var(--gold);margin:12px 0;">Q: "${ex.question}"</p>
    <div class="comparison">
      <div class="comp-box b6-box"><div class="comp-label">Band 6 Answer</div><p>"${ex.b6}"</p></div>
      <div class="comp-box b7-box"><div class="comp-label">Band 7 Answer</div><p>"${ex.b7}"</p></div>
    </div>
    <div class="mt-16" style="background:var(--surface2);padding:16px;border-radius:10px;">
      <p class="text-sm" style="font-weight:600;color:var(--accent2);margin-bottom:8px;">Why the Band 7 answer works:</p>
      ${ex.analysis.map(a=>`<p class="text-sm mt-8"><span class="hl-green highlight-strip">${a.label}</span> ${a.detail}</p>`).join('')}
    </div>
    <div class="mt-24" style="text-align:right;"><button class="btn btn-primary" onclick="nextEx()">Continue →</button></div>
  </div>`;
}

function renderRewriteDrill(ex) {
  return `<div class="card"><h2>${ex.title}</h2><p class="text-muted mb-16">${ex.instruction}</p>
    ${ex.items.map((item,ii) => {
      const key = `rw_${S.curMod}_${S.curEx}_${ii}`;
      const ans = S.exAns[key]; const done = ans!==undefined;
      return `<div style="margin-bottom:16px;padding:16px;background:var(--surface2);border-radius:10px;">
        <p class="text-sm text-muted mb-8">Band 6 original:</p>
        <p style="font-weight:600;margin-bottom:12px;">"${item.b6}"</p>
        <p class="text-sm text-muted mb-8">Choose the Band 7 version:</p>
        ${item.opts.map((o,oi) => {
          let c = 'quiz-option';
          if (done) { if (oi===item.correct) c+=' correct'; else if (oi===ans&&oi!==item.correct) c+=' wrong'; }
          return `<button class="${c}" style="font-size:13px;padding:10px 14px;" ${done?'disabled':''} onclick="aEx('${key}',${oi},${item.correct})">${o}</button>`;
        }).join('')}
        ${done?`<div class="explanation">${ans===item.correct?'✅ ':'❌ '}${item.why}</div>`:''}
      </div>`;
    }).join('')}
    <div style="text-align:right;"><button class="btn btn-primary" onclick="nextEx()">Continue →</button></div>
  </div>`;
}

function renderReadingStrategy(ex) {
  return `<div class="card">
    <h2>${ex.title}</h2>
    <div style="margin:16px 0;padding:18px;background:var(--surface2);border-radius:10px;font-size:14px;line-height:1.8;font-style:italic;">
      "${ex.passage}"
    </div>
    ${ex.questions.map((q,qi) => {
      const key = `read_${S.curMod}_${S.curEx}_${qi}`;
      const ans = S.exAns[key]; const done = ans!==undefined;
      return `<div style="margin-bottom:16px;padding:16px;background:var(--surface2);border-radius:10px;">
        <p style="font-weight:600;margin-bottom:10px;">${q.q}</p>
        ${q.opts.map((o,oi) => {
          let c = 'quiz-option';
          if (done) { if (oi===q.correct) c+=' correct'; else if (oi===ans&&oi!==q.correct) c+=' wrong'; }
          return `<button class="${c}" ${done?'disabled':''} onclick="aEx('${key}',${oi},${q.correct})">${o}</button>`;
        }).join('')}
        ${done?`<div class="explanation">${ans===q.correct?'✅ ':'❌ '}${q.why}</div>`:''}
      </div>`;
    }).join('')}
    <div style="text-align:right;"><button class="btn btn-primary" onclick="nextEx()">Continue →</button></div>
  </div>`;
}

function renderPlan(ex) {
  return `<div class="card"><h2>${ex.title}</h2><p class="text-muted">Consistency over intensity. Every single day.</p></div>
    ${ex.weeks.map(w=>`<div class="card"><h3 style="color:var(--gold)">${w.label}</h3>
      ${w.days.map(d=>`<div style="display:flex;gap:14px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);">
        <div style="min-width:55px;font-weight:700;color:var(--accent2);font-size:13px;">${d.time}</div>
        <div style="flex:1"><p style="font-weight:600;font-size:13px;">${d.task}</p><p class="text-sm text-muted">${d.detail}</p></div>
      </div>`).join('')}
    </div>`).join('')}
    <div style="text-align:right;"><button class="btn btn-primary" onclick="nextEx()">Complete Module →</button></div>
  `;
}

function renderModComplete() {
  const m = MODS[S.curMod];
  if (!S.completedMods.includes(S.curMod)) { S.completedMods.push(S.curMod); S.xp += 150; }
  return `<div class="card text-center"><div class="hero-emoji">🎉</div><h2>Module Complete!</h2><p class="mt-8">${m.emoji} ${m.title}</p><p class="mt-8" style="color:var(--gold);font-weight:600;">+150 XP</p><div class="mt-24"><button class="btn btn-gold" onclick="goMods()">Back to Modules</button></div></div>`;
}

// ── ACTIONS ──
function goHome() { S.screen='home'; render(); }
function goMods() { S.screen='modules'; render(); }
function startDiag() { S.screen='diagnostic'; S.dStep=0; S.dAnswers=[]; render(); }
function aDiag(i) { if(S.dAnswers[S.dStep]!==undefined) return; S.dAnswers[S.dStep]=i; if(i===DIAG[S.dStep].correct) S.xp+=15; render(); }
function nDiag() { S.dStep++; render(); window.scrollTo(0,0); }
function openMod(i) { S.curMod=i; S.curEx=0; S.writingText=''; S.speakTime=0; S.speakRunning=false; S.speakPhase='prep'; S.screen='module-detail'; render(); window.scrollTo(0,0); }
function aEx(key,sel,cor) { if(S.exAns[key]!==undefined) return; S.exAns[key]=sel; if(sel===cor) S.xp+=15; render(); }
function nextEx() { S.curEx++; S.writingText=''; S.speakTime=0; S.speakRunning=false; S.speakPhase='prep'; render(); window.scrollTo(0,0); }

function checkB7Writing() {
  const t = S.writingText.toLowerCase();
  const fb = [];
  if (t.match(/\b(nowadays|in this modern era|as we know)\b/)) fb.push('🔴 Cliché opener detected — remove "Nowadays" / "In this modern era" / "As we know"');
  if (t.match(/\b(firstly|secondly|thirdly|moreover|furthermore|in addition)\b/g)?.length > 2) fb.push('🟡 Too many mechanical connectors — vary your cohesion devices');
  if (t.match(/\b(would|could|may|might|tend to|arguably|likely|perhaps)\b/)) fb.push('🟢 Hedging language detected — nice!');
  if (t.match(/\b(having .+ed|being .+ed|,\s*\w+ing\b)/)) fb.push('🟢 Participle clause detected — Band 7 grammar!');
  if (t.match(/\b(not only|it is .+ that|rarely|seldom|never before)\b/)) fb.push('🟢 Complex structure (cleft/inversion) detected!');
  if (t.match(/\b(very|really|a lot|so much|big|small|good|bad)\b/g)?.length > 2) fb.push('🟡 Consider replacing basic adjectives: "very big" → "substantial", "very good" → "considerable"');
  if (!t.match(/\b(significant|considerable|substantial|fundamental|crucial|prevalent)\b/) && t.length > 80) fb.push('🟡 No "less common" vocabulary detected — try upgrading some word choices');
  if (t.match(/\b(is widely|is generally|is commonly|is often regarded)\b/)) fb.push('🟢 Passive reporting structure — excellent!');
  const el = document.getElementById('wfeedback');
  if (el) {
    if (t.length < 30) el.innerHTML = '<div class="explanation">Write more first!</div>';
    else if (fb.length === 0) el.innerHTML = '<div class="explanation" style="border-color:var(--green)">✅ No obvious issues. Check your collocations and make sure every idea is fully developed.</div>';
    else el.innerHTML = `<div class="explanation">${fb.join('<br>')}</div>`;
  }
}

let tmr = null;
function startTimer(max) {
  S.speakRunning = true; S.speakTime = 0; render();
  tmr = setInterval(() => {
    S.speakTime++;
    const ex = MODS[S.curMod].exercises[S.curEx];
    const m = S.speakPhase==='prep' ? ex.prepTime : ex.speakTime;
    if (S.speakTime >= m) { clearInterval(tmr); S.speakRunning=false; if(S.speakPhase==='prep'){toSpeak();return;} }
    render();
  }, 1000);
}
function stopTimer() { clearInterval(tmr); S.speakRunning=false; render(); }
function toSpeak() { clearInterval(tmr); S.speakPhase='speak'; S.speakTime=0; S.speakRunning=false; render(); }

render();
</script>

  <script>
    (function() {
      var root = document.documentElement;
      var knob = document.getElementById('toggleKnob');
      function applyTheme(t) {
        root.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
        if (knob) knob.style.transform = t === 'light' ? 'translateX(22px)' : 'translateX(0)';
      }
      var saved = localStorage.getItem('theme') || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      applyTheme(saved);
      var btn = document.getElementById('themeToggle');
      if (btn) btn.addEventListener('click', function() {
        applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
      });
    })();
  </script>
</body>
