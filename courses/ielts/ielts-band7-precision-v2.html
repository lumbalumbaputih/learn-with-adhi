<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Band 7 Precision Lab — Learn with Adhi</title>
  <link rel="icon" href="/assets/favicon-32.png" type="image/png" />
  <script>
    (function(){
      var s=localStorage.getItem('theme');
      var d=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';
      document.documentElement.setAttribute('data-theme',s||d);
    })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <script>window.si=window.si||function(){(window.siq=window.siq||[]).push(arguments)};</script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <style>
/* ═══ MENOR DESIGN TOKENS ═══════════════════════════════════════════════ */
:root {
  /* Raw Menor palette */
  --c-hijau:   #19ae5d;
  --c-biru:    #1c5ddc;
  --c-kuning:  #feb52b;
  --c-jingga:  #fc351c;
  --c-pink:    #eb30a2;
  --c-pesisir: #00aaff;
  --c-putih:   #ffffff;

  /* Course identity — K1: Biru Abang + Pink None */
  --c-primary: #1c5ddc;
  --c-accent:  #19ae5d;
  --c-ink:     #ffffff;

  /* Layout */
  --sidebar-w: 288px;
  --progress-h: 3px;
  --radius-lg: 16px;
  --radius-md: 10px;
  --radius-sm: 6px;

  /* Typography */
  --fs-display: clamp(2rem, 4vw, 3rem);
  --fs-h1: clamp(1.5rem, 3vw, 2rem);
  --fs-h2: clamp(1.2rem, 2.5vw, 1.5rem);
  --fs-h3: 1.1rem;
  --fs-body: 1rem;
  --fs-sm: 0.875rem;
  --fs-xs: 0.75rem;
}

[data-theme="light"] {
  --bg:           #fafaf7;
  --bg-subtle:    #f2f1ec;
  --surface:      #ffffff;
  --surface2:     #f5f4ef;
  --border:       rgba(0,0,0,0.08);
  --border-md:    rgba(0,0,0,0.13);
  --text:         #141419;
  --text-dim:     #5a5b66;
  --text-muted:   #9a9ba6;
  --sidebar-bg:   #f5f4ef;
  --sidebar-text: #141419;
  --code-bg:      #f0efe9;
  --shadow:       0 4px 24px -4px rgba(0,0,0,0.10);
  --shadow-lg:    0 20px 60px -15px rgba(0,0,0,0.12);
  --toggle-track: #e2e2ea;
  --toggle-knob:  #141419;

  /* Dark variants for light mode */
  --c-primary-dim: #1c5ddc;
  --c-accent-dim:  #eb30a2;
  --c-hijau-dim:   #19ae5d;
  --c-kuning-dim:  #feb52b;
  --c-jingga-dim:  #fc351c;
  --c-pesisir-dim: #00aaff;
  --c-pink-dim:    #eb30a2;
}

[data-theme="dark"] {
  --bg:           #0b0b12;
  --bg-subtle:    #12121c;
  --surface:      #17172280;
  --surface2:     #1d1d2a;
  --border:       rgba(255,255,255,0.09);
  --border-md:    rgba(255,255,255,0.15);
  --text:         #ececf0;
  --text-dim:     #9092a3;
  --text-muted:   #555664;
  --sidebar-bg:   #0f0f1a;
  --sidebar-text: #ececf0;
  --code-bg:      #12121c;
  --shadow:       0 4px 24px -4px rgba(0,0,0,0.4);
  --shadow-lg:    0 20px 60px -15px rgba(0,0,0,0.6);
  --toggle-track: #1d1d2a;
  --toggle-knob:  #ececf0;

  /* Lifted Menor colours for dark backgrounds */
  --c-primary-dim: #3a79ec;
  --c-accent-dim:  #2ec272;
  --c-hijau-dim:   #2ec272;
  --c-kuning-dim:  #ffc649;
  --c-jingga-dim:  #ff5a43;
  --c-pesisir-dim: #1fbaff;
  --c-pink-dim:    #f054b5;
}

/* ═══ RESET ══════════════════════════════════════════════════════════════ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; color-scheme: light dark; }

body {
  font-family: "DM Sans", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: var(--fs-body);
  line-height: 1.7;
  transition: background .3s, color .3s;
  -webkit-tap-highlight-color: transparent;
}

h1, h2, h3 {
  font-family: "DM Serif Display", serif;
  line-height: 1.2;
  letter-spacing: -0.01em;
}

a { color: var(--c-primary-dim); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ═══ SCROLL PROGRESS BAR ════════════════════════════════════════════════ */
#progress-rail {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--progress-h);
  background: var(--border);
  z-index: 300;
}
#progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--c-primary), var(--c-accent));
  transition: width .12s linear;
}

/* ═══ LAYOUT ═════════════════════════════════════════════════════════════ */
.app {
  display: flex;
  min-height: 100vh;
}

/* ─── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: var(--sidebar-w);
  height: 100vh;
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 200;
  transition: transform .3s cubic-bezier(.4,0,.2,1), background .3s;
  overflow: hidden;
}

.sidebar-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.brand-icon {
  width: 40px; height: 40px;
  border-radius: var(--radius-md);
  background: var(--c-primary);
  display: grid; place-items: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}

.brand-name {
  font-size: var(--fs-sm);
  font-weight: 600;
  line-height: 1.3;
  color: var(--sidebar-text);
}
.brand-name small {
  display: block;
  font-size: var(--fs-xs);
  font-weight: 400;
  color: var(--text-muted);
  margin-top: 1px;
}

/* Level tabs */
.level-nav {
  display: flex;
  gap: 6px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.level-tab {
  flex: 1;
  padding: 7px 4px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  font-family: "DM Sans", sans-serif;
  font-size: var(--fs-xs);
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all .2s;
}
.level-tab.active {
  background: var(--c-primary);
  border-color: var(--c-primary);
  color: #fff;
}
.level-tab:not(.active):hover {
  border-color: var(--c-primary);
  color: var(--c-primary-dim);
}

/* Module list */
.module-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0 16px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.mod-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all .18s;
  text-decoration: none;
}
.mod-item:hover {
  background: var(--surface2);
  border-left-color: var(--border-md);
}
.mod-item.active {
  background: var(--surface2);
  border-left-color: var(--c-primary);
}

.mod-item-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: grid; place-items: center;
  font-size: 0.7rem;
  font-weight: 700;
  flex-shrink: 0;
  color: var(--text-muted);
  transition: background .18s, color .18s;
}
.mod-item.active .mod-item-num {
  background: var(--c-primary);
  border-color: var(--c-primary);
  color: #fff;
}

.mod-item-text {
  flex: 1;
  font-size: var(--fs-sm);
  font-weight: 500;
  color: var(--text-dim);
  line-height: 1.35;
  transition: color .18s;
}
.mod-item.active .mod-item-text { color: var(--text); }

.mod-item-time {
  font-size: 0.68rem;
  color: var(--text-muted);
  flex-shrink: 0;
}

/* Sidebar footer */
.sidebar-footer {
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 10px;
}

.back-link {
  font-size: var(--fs-xs);
  font-weight: 600;
  color: var(--text-dim);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: color .2s;
}
.back-link:hover { color: var(--text); text-decoration: none; }

.theme-toggle {
  position: relative;
  width: 46px; height: 24px;
  border-radius: 99px;
  background: var(--toggle-track);
  border: 1px solid var(--border);
  cursor: pointer;
  flex-shrink: 0;
  transition: background .3s;
}
.theme-toggle::after {
  content: "";
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--toggle-knob);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
}
[data-theme="light"] .theme-toggle::after { transform: translateX(22px); }

/* ─── Content area ────────────────────────────────────────────────────── */
.content {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
}

/* Level sections */
.level-section {
  display: none;
  padding-bottom: 80px;
}
.level-section.active { display: block; }

/* Level hero */
.level-hero {
  padding: 56px 48px 48px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, 
    color-mix(in srgb, var(--c-primary) 6%, transparent),
    transparent 60%
  );
  position: relative;
  overflow: hidden;
}
.level-hero::after {
  content: "";
  position: absolute;
  top: -60px; right: -60px;
  width: 240px; height: 240px;
  border-radius: 50%;
  background: var(--c-accent);
  opacity: .04;
  filter: blur(60px);
  pointer-events: none;
}
.level-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: var(--fs-xs);
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--c-primary-dim);
  background: color-mix(in srgb, var(--c-primary) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--c-primary) 25%, transparent);
  border-radius: 99px;
  padding: 4px 12px;
  margin-bottom: 20px;
}
.level-hero h1 {
  font-size: var(--fs-display);
  margin-bottom: 14px;
  max-width: 640px;
}
.level-hero p {
  color: var(--text-dim);
  font-size: clamp(1rem, 2vw, 1.1rem);
  max-width: 560px;
  line-height: 1.7;
}
.level-meta {
  display: flex;
  gap: 20px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.level-meta-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: var(--fs-sm);
  color: var(--text-dim);
}
.level-meta-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--c-primary-dim);
}

/* ═══ MODULE CARD ════════════════════════════════════════════════════════ */
.module {
  --module-accent: var(--c-primary);
  max-width: 820px;
  margin: 32px auto;
  width: calc(100% - 64px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid var(--module-accent);
  border-radius: var(--radius-lg);
  padding: 36px 40px;
  box-shadow: var(--shadow);
  transition: border-color .2s, box-shadow .2s;
}
.module:target,
.module.in-view {
  box-shadow: var(--shadow-lg);
}

.module-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.module-num {
  width: 42px; height: 42px;
  border-radius: 12px;
  background: var(--module-accent);
  color: #fff;
  display: grid; place-items: center;
  font-size: 1rem;
  font-weight: 700;
  flex-shrink: 0;
  font-family: "DM Sans", sans-serif;
}

.module-header h2 {
  flex: 1;
  font-size: var(--fs-h2);
  font-family: "DM Serif Display", serif;
  letter-spacing: -0.01em;
}

.module-time {
  font-size: var(--fs-xs);
  font-weight: 600;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 4px 10px;
  white-space: nowrap;
  flex-shrink: 0;
}

.module > p,
.module > h3,
.module > ul,
.module > ol {
  color: var(--text);
  margin-bottom: 20px;
  max-width: 68ch;
  line-height: 1.75;
}

/* ═══ CONTENT COMPONENTS ════════════════════════════════════════════════ */

/* Analogy box */
.analogy {
  background: color-mix(in srgb, var(--module-accent) 8%, var(--surface2));
  border: 1px solid color-mix(in srgb, var(--module-accent) 20%, transparent);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  margin: 20px 0;
  font-size: var(--fs-sm);
  line-height: 1.7;
  color: var(--text);
}
.analogy.coral {
  background: color-mix(in srgb, var(--c-jingga-dim) 8%, var(--surface2));
  border-color: color-mix(in srgb, var(--c-jingga-dim) 20%, transparent);
}
.analogy strong { color: var(--text); }

/* Key concept */
.key-concept {
  background: color-mix(in srgb, var(--c-primary) 7%, var(--surface));
  border: 1px solid color-mix(in srgb, var(--c-primary) 20%, transparent);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  margin: 24px 0;
}
.key-concept h3 {
  font-size: var(--fs-sm);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--c-primary-dim);
  margin-bottom: 10px;
  font-family: "DM Sans", sans-serif;
}
.key-concept p { color: var(--text-dim); margin-bottom: 0; font-size: var(--fs-sm); }

/* Warning */
.warning {
  background: color-mix(in srgb, var(--c-jingga-dim) 8%, var(--surface2));
  border: 1px solid color-mix(in srgb, var(--c-jingga-dim) 25%, transparent);
  border-radius: var(--radius-md);
  padding: 16px 20px;
  margin: 20px 0;
  font-size: var(--fs-sm);
  color: var(--text);
}
.warning::before { content: "⚠️  "; }

/* Diagram wrapper */
.diagram {
  margin: 24px 0;
  overflow-x: auto;
  border-radius: var(--radius-md);
}
.diagram svg {
  max-width: 100%;
  height: auto;
  display: block;
}

/* Code block */
.code-block, pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 20px 24px;
  margin: 20px 0;
  overflow-x: auto;
  font-family: "DM Sans", monospace;
  font-size: 0.85rem;
  line-height: 1.65;
  color: var(--text);
}
.code-block.tree { white-space: pre; }
code, .cmd {
  font-family: "DM Sans", monospace;
  font-size: 0.85em;
  background: var(--code-bg);
  border: 1px solid var(--border);
  padding: 2px 7px;
  border-radius: var(--radius-sm);
  color: var(--text);
}
.prompt { color: var(--text-muted); }
.comment { color: var(--text-muted); font-style: italic; }
.str { color: var(--c-hijau-dim); }
.flag { color: var(--c-pesisir-dim); }
.version { display: none; }

/* Command grid */
.cmd-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
  gap: 14px;
  margin: 20px 0;
}
.cmd-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px 18px;
  transition: border-color .18s, transform .18s;
}
.cmd-card:hover {
  border-color: var(--c-primary);
  transform: translateY(-2px);
}
.cmd-name {
  font-family: "DM Sans", monospace;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--c-primary-dim);
  margin-bottom: 6px;
}
.cmd-desc {
  font-size: var(--fs-sm);
  color: var(--text-dim);
  line-height: 1.55;
}

/* Steps */
.steps { margin: 20px 0; }
.step {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.step:last-child { border-bottom: none; }
.step-num {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--c-primary);
  color: #fff;
  display: grid; place-items: center;
  font-size: 0.75rem;
  font-weight: 700;
  flex-shrink: 0;
  margin-top: 2px;
}

/* Compare / side by side */
.compare, .side-by-side {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 20px 0;
}
@media (max-width: 600px) {
  .compare, .side-by-side { grid-template-columns: 1fr; }
}
table.compare {
  display: table;
  width: 100%;
  border-collapse: collapse;
  table-layout: auto;
  margin: 20px 0;
}
table.compare th,
table.compare td {
  padding: 10px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  font-size: var(--fs-sm);
  line-height: 1.5;
  min-width: 120px;
}
table.compare th {
  font-weight: 700;
  color: var(--text);
  background: var(--surface2);
}
table.compare tr:last-child td { border-bottom: none; }

/* Checklist */
.checklist { margin: 20px 0; }
.check-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  font-size: var(--fs-sm);
  color: var(--text-dim);
}
.check-item:last-child { border-bottom: none; }
.check-item input[type="checkbox"] { display: none; }
.check-item::before {
  content: "○";
  color: var(--c-primary-dim);
  font-size: 1rem;
  flex-shrink: 0;
  margin-top: 1px;
  line-height: 1.2;
}

/* Flow diagram components */
.flow-container {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin: 20px 0;
  padding: 20px;
  background: var(--surface2);
  border-radius: var(--radius-md);
  overflow-x: auto;
}
.flow-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  font-size: var(--fs-sm);
  font-weight: 600;
  text-align: center;
  white-space: nowrap;
}
.flow-box.highlight {
  background: var(--c-primary);
  border-color: var(--c-primary);
  color: #fff;
}
.flow-box.green {
  background: color-mix(in srgb, var(--c-hijau-dim) 12%, var(--surface));
  border-color: color-mix(in srgb, var(--c-hijau-dim) 30%, transparent);
  color: var(--c-hijau-dim);
}
.flow-arrow { color: var(--text-muted); font-size: 1.1rem; flex-shrink: 0; }
.flow-label { font-size: var(--fs-xs); color: var(--text-muted); text-align: center; }

/* File boxes */
.file-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  margin: 12px 0;
}
.file-title {
  font-family: "DM Sans", monospace;
  font-size: 0.82rem;
  font-weight: 600;
  margin-bottom: 6px;
}
.file-ext { color: var(--c-accent-dim); }
.file-desc { font-size: var(--fs-sm); color: var(--text-dim); }

/* Time estimate */
.time-est {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: var(--fs-xs);
  font-weight: 600;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 3px 10px;
  margin-bottom: 20px;
}

/* Quiz */
.quiz {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 24px;
  margin: 24px 0;
}
.quiz h3 {
  font-size: var(--fs-sm);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--c-accent-dim);
  margin-bottom: 14px;
  font-family: "DM Sans", sans-serif;
}
.quiz p { color: var(--text); margin-bottom: 16px; }
.quiz-option {
  display: block;
  width: 100%;
  text-align: left;
  padding: 12px 16px;
  margin-bottom: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: "DM Sans", sans-serif;
  font-size: var(--fs-sm);
  cursor: pointer;
  transition: all .15s;
}
.quiz-option:hover { border-color: var(--c-accent); background: var(--bg); }
.quiz-option.correct { border-color: var(--c-hijau-dim); background: color-mix(in srgb, var(--c-hijau-dim) 10%, var(--surface)); }
.quiz-option.wrong   { border-color: var(--c-jingga-dim); background: color-mix(in srgb, var(--c-jingga-dim) 10%, var(--surface)); }
.quiz-result { font-size: var(--fs-sm); margin-top: 10px; min-height: 20px; font-weight: 500; }

/* Next level CTA */
.next-level {
  background: linear-gradient(135deg,
    color-mix(in srgb, var(--c-primary) 10%, var(--surface)),
    color-mix(in srgb, var(--c-accent) 8%, var(--surface))
  );
  border: 1px solid color-mix(in srgb, var(--c-primary) 20%, transparent);
  border-radius: var(--radius-lg);
  padding: 32px 36px;
  max-width: 820px;
  margin: 32px auto;
  width: calc(100% - 64px);
  text-align: center;
}
.next-level h3 {
  font-size: var(--fs-h2);
  margin-bottom: 10px;
}
.next-level p { color: var(--text-dim); margin-bottom: 20px; }
.btn-next {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 28px;
  background: var(--c-primary);
  color: #fff;
  border: none;
  border-radius: 99px;
  font-family: "DM Sans", sans-serif;
  font-size: var(--fs-sm);
  font-weight: 700;
  cursor: pointer;
  transition: opacity .2s, transform .2s;
}
.btn-next:hover { opacity: .88; transform: translateY(-2px); }

/* Summary grid */
.summary-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, 200px), 1fr));
  gap: 14px;
  margin: 20px 0;
}

/* Hero (inside module) */
.hero {
  padding: 0;
  margin-bottom: 20px;
}
.hero-badge {
  display: inline-block;
  font-size: var(--fs-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--c-primary-dim);
  background: color-mix(in srgb, var(--c-primary) 10%, transparent);
  border: 1px solid color-mix(in srgb, var(--c-primary) 20%, transparent);
  border-radius: 99px;
  padding: 3px 10px;
  margin-bottom: 14px;
}

/* Container (inside module) */
.container { max-width: 100%; }

/* Old footer inside modules — hide */
.footer { display: none; }

/* ═══ MOBILE ═════════════════════════════════════════════════════════════ */
.mobile-header {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--sidebar-bg);
  border-bottom: 1px solid var(--border);
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 250;
}
.mobile-header .brand { font-size: var(--fs-sm); font-weight: 600; }
.burger {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  background: none; border: none; cursor: pointer;
  color: var(--text); font-size: 1.2rem;
}

@media (max-width: 768px) {
  .mobile-header { display: flex; }
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open {
    transform: translateX(0);
  }
  .content {
    margin-left: 0;
    padding-top: 52px;
  }
  .level-hero { padding: 32px 20px 28px; }
  .module { margin: 20px 16px; padding: 24px 20px; }
  .next-level { margin: 20px 16px; padding: 24px 20px; }
  .sidebar-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.5);
    z-index: 199;
    display: none;
  }
  .sidebar-overlay.show { display: block; }
}

/* ── Orphaned pre-module content (intro sections from original file) ── */
.level-section > .container,
.level-section > .hero,
.level-section > .hero.container {
  max-width: 820px;
  width: calc(100% - 64px);
  margin: 0 auto;
  padding: 28px 40px 0;
}
.level-section > .hero h1,
.level-section > .hero.container h1 {
  font-family: "DM Serif Display", serif;
  font-size: var(--fs-display);
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 16px;
}
.level-section > .hero p,
.level-section > .hero.container p {
  color: var(--text-dim);
  font-size: 1.05rem;
  max-width: 56ch;
  margin-bottom: 16px;
}
/* Hide raw orphaned links between level hero and first module */
.level-section > a {
  display: none;
}


/* ── SVG diagram dark-mode overrides ────────────────────────────────── */
[data-theme="dark"] svg .rest-text,
[data-theme="dark"] svg .rest-sub,
[data-theme="dark"] svg .rest-label,
[data-theme="dark"] svg .rest-emoji { fill: var(--text-dim) !important; }

[data-theme="dark"] svg .rest-arrow { stroke: var(--text-muted) !important; }

/* Generic SVG text in dark mode — catches other diagram labels */
[data-theme="dark"] svg text:not([fill^="#0"]):not([fill^="#1"]):not([fill^="#2"]):not([fill^="#3"]):not([fill^="#f"]):not([fill^="#e"]):not([fill="white"]):not([fill="#fff"]) {
  fill: var(--text-dim);
}
[data-theme="dark"] svg .flow-label { fill: var(--text-muted) !important; }

#tab-l2, #tab-l3 { display: none; }
</style>
</head>
<body>
<div id="progress-rail"><div id="progress-fill"></div></div>

<header class="mobile-header">
  <button class="burger" id="burger" aria-label="Open menu">☰</button>
  <span class="brand">Band 7 Precision Lab</span>
  <button class="theme-toggle" id="themeToggleMobile" aria-label="Toggle theme" style="position:static;transform:none;"></button>
</header>

<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">🎯</div>
      <div class="brand-name">
        Band 7 Precision Lab
        <small>Kombinasi 3 · Biru Abang</small>
      </div>
    </div>

    <nav class="level-nav" aria-label="Course levels">
      <button class="level-tab active" data-level="1">L1</button>
      <button class="level-tab" data-level="2">L2</button>
      <button class="level-tab" data-level="3">L3</button>
    </nav>

    <div class="module-list" id="module-list"></div>

    <div class="sidebar-footer">
      <a class="back-link" href="index.html">← All courses</a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
    </div>
  </aside>

  <div class="content">
    <main>
      <section id="level-1" class="level-section active">
        <div class="level-hero">
          <span class="level-badge">BAND 7 PRECISION · IELTS ACADEMIC</span>
          <h1>The Precision Lab</h1>
          <p>The exact upgrades that separate Band 6 from Band 7.</p>
        </div>
      </section>

      <section id="level-2" class="level-section">
        <div class="level-hero">
          <h1>Level 2</h1>
        </div>
      </section>

      <section id="level-3" class="level-section">
        <div class="level-hero">
          <h1>Level 3</h1>
        </div>
      </section>
    </main>
  </div>
</div>

<script>
// ─── Theme ───────────────────────────────────────────────────────────────
const root = document.documentElement;
const saved = localStorage.getItem('theme');
const sys = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
root.setAttribute('data-theme', saved || sys);

document.getElementById('themeToggle').addEventListener('click', () => {
  const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});

// ─── Scroll progress bar ─────────────────────────────────────────────
const fill = document.getElementById('progress-fill');
function updateProgress() {
  const el = document.documentElement;
  const pct = el.scrollTop / (el.scrollHeight - el.clientHeight);
  fill.style.width = Math.min(pct * 100, 100) + '%';
}
document.addEventListener('scroll', updateProgress, { passive: true });

// ─── Course data (L1 ONLY - 9 MODULES) ───────────────────────────
const COURSE = {
  levels: [
    {
      id: 1, label: "Level 1", subtitle: "The Foundation",
      desc: "The exact upgrades that separate Band 6 from Band 7.",
      modules_count: 9,
      modules: [
        { id:"l1-mod0", num:0, title:"The Band 6→7 Gap Analysis", time:15 },
        { id:"l1-mod1", num:1, title:"Collocation Surgery", time:25 },
        { id:"l1-mod2", num:2, title:"Grammar Range Upgrade", time:25 },
        { id:"l1-mod3", num:3, title:"Writing Task 1: Data Surgeon", time:30 },
        { id:"l1-mod4", num:4, title:"Writing Task 2: Argument Architect", time:30 },
        { id:"l1-mod5", num:5, title:"Reading: Band 7 Tactics", time:25 },
        { id:"l1-mod6", num:6, title:"Speaking: Part 3 Masterclass", time:25 },
        { id:"l1-mod7", num:7, title:"Listening: Section 3 & 4 Warfare", time:20 },
        { id:"l1-mod8", num:8, title:"The 8-Week Battle Plan", time:10 },
      ]
    },
    {
      id: 2, label: "Level 2", subtitle: "Going Deeper",
      desc: "Going deeper into the concepts.",
      modules_count: 0,
      modules: []
    },
    {
      id: 3, label: "Level 3", subtitle: "Professional Stack",
      desc: "Professional level patterns.",
      modules_count: 0,
      modules: []
    }
  ]
};

// ─── Sidebar: render module list ─────────────────────────────────────────
let activeLevel = 1;

function renderModuleList(levelId) {
  const lvl = COURSE.levels.find(l => l.id === levelId);
  const list = document.getElementById('module-list');
  list.innerHTML = lvl.modules.map(m => `
    <a class="mod-item" data-target="${m.id}" href="#${m.id}">
      <span class="mod-item-num">${m.num}</span>
      <span class="mod-item-text">${m.title}</span>
      ${m.time > 0 ? `<span class="mod-item-time">${m.time}m</span>` : ''}
    </a>
  `).join('');

  list.querySelectorAll('.mod-item').forEach(item => {
    item.addEventListener('click', e => {
      e.preventDefault();
      const target = document.getElementById(item.dataset.target);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      closeSidebar();
    });
  });
}

// ─── Level switching ─────────────────────────────────────────────────────
document.querySelectorAll('.level-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    const lvl = parseInt(tab.dataset.level);
    activeLevel = lvl;
    document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.level-section').forEach(s => s.classList.remove('active'));
    document.getElementById('level-' + lvl).classList.add('active');
    renderModuleList(lvl);
    window.scrollTo({ top: 0, behavior: 'smooth' });
    localStorage.setItem('lastLevel', lvl);
  });
});

// ─── IntersectionObserver ────────────────────────────────────────────────
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      document.querySelectorAll('.mod-item').forEach(item => {
        item.classList.toggle('active', item.dataset.target === entry.target.id);
      });
    }
  });
}, { rootMargin: '-8% 0px -45% 0px', threshold: 0 });

function observeModules(levelId) {
  const lvl = COURSE.levels.find(l => l.id === levelId);
  lvl.modules.forEach(m => {
    const el = document.getElementById(m.id);
    if (el) observer.observe(el);
  });
}

// ─── Mobile sidebar ───────────────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('sidebar-overlay');

function openSidebar() {
  sidebar.classList.add('open');
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('burger').addEventListener('click', openSidebar);
overlay.addEventListener('click', closeSidebar);

// ─── Init ─────────────────────────────────────────────────────────────────
const savedLevel = parseInt(localStorage.getItem('lastLevel')) || 1;
if (savedLevel !== 1) {
  activeLevel = savedLevel;
  document.querySelectorAll('.level-tab').forEach(t => {
    t.classList.toggle('active', parseInt(t.dataset.level) === savedLevel);
  });
  document.querySelectorAll('.level-section').forEach(s => s.classList.remove('active'));
  const saved_section = document.getElementById('level-' + savedLevel);
  if (saved_section) saved_section.classList.add('active');
}

renderModuleList(activeLevel);
observeModules(activeLevel);

</script>
</body>
</html>
