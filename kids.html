<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rayyan & Raya · Pilih Petualangan</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="%23FFC234"/><text y=".9em" font-size="80" x="10">🌟</text></svg>'>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>window.si=window.si||function(){(window.siq=window.siq||[]).push(arguments)};</script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <style>
    :root {
      --tomato:  #FF5C39;
      --mango:   #FFC234;
      --forest:  #1F9D55;
      --sea:     #1FA9C7;
      --mawar:   #E84BA0;
      --indigo:  #2E3192;
      --ink:     #1A1614;
      --paper:   #FBF4E6;
      --paper-2: #F4ECD8;
      --line:    rgba(26,22,20,0.12);
      --muted:   #6B6259;
      --fd: 'Bricolage Grotesque', 'Arial Black', sans-serif;
      --fb: 'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body { font-family: var(--fb); background: var(--paper); color: var(--ink); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }

    .shell { max-width: 1000px; margin: 0 auto; padding: 0 48px; }
    @media (max-width: 860px) { .shell { padding: 0 28px; } }
    @media (max-width: 560px) { .shell { padding: 0 18px; } }

    /* NAV */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 0; border-bottom: 2px solid var(--ink);
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-wordmark { font-family: var(--fd); font-weight: 800; font-size: 24px; letter-spacing: -0.03em; }
    .brand-divider { width: 1.5px; height: 22px; background: var(--line); }
    .brand-sub { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .nav-back {
      font-size: 14px; font-weight: 700; color: var(--ink);
      background: var(--paper-2); border: 2px solid var(--ink); border-radius: 999px; padding: 8px 18px;
      transition: background .18s;
    }
    .nav-back:hover { background: var(--mango); }

    /* HERO */
    .hero { padding: 72px 0 48px; }
    .hero-eyebrow {
      display: flex; align-items: center; gap: 12px;
      font-size: 12px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 20px;
    }
    .hero-eyebrow::before {
      content: ''; display: block; width: 32px; height: 3px; background: var(--mango); flex-shrink: 0;
    }
    .hero-h1 {
      font-family: var(--fd); font-weight: 800;
      font-size: clamp(52px, 9vw, 108px);
      line-height: .9; letter-spacing: -0.04em; margin-bottom: 20px;
    }
    .hero-lead { font-size: 18px; line-height: 1.55; color: var(--muted); max-width: 480px; }

    /* CHOOSER */
    .chooser {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
      margin-top: 56px; margin-bottom: 80px;
    }
    @media (max-width: 580px) { .chooser { grid-template-columns: 1fr; gap: 20px; margin-top: 40px; } }

    .chooser-card {
      border: 3px solid var(--ink); border-radius: 28px;
      padding: 48px 40px; display: flex; flex-direction: column; gap: 16px;
      transition: transform .18s ease, box-shadow .18s ease;
      position: relative; overflow: hidden;
    }
    .chooser-card:hover {
      transform: translate(-5px, -5px);
      box-shadow: 8px 8px 0 var(--ink);
    }
    .chooser-card.rayyan { background: #FFF0EC; }
    .chooser-card.raya   { background: #FFF0F7; }

    .chooser-avatar {
      font-size: 72px; line-height: 1;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,.15));
    }
    .chooser-name {
      font-family: var(--fd); font-weight: 800;
      font-size: clamp(40px, 6vw, 60px); letter-spacing: -0.03em;
      line-height: 1;
    }
    .chooser-card.rayyan .chooser-name { color: var(--tomato); }
    .chooser-card.raya   .chooser-name { color: var(--mawar); }

    .chooser-desc {
      font-size: 15px; line-height: 1.5; color: var(--muted); font-weight: 500;
    }
    .chooser-stats {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px;
    }
    .chooser-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: white; border: 1.5px solid var(--ink);
      border-radius: 999px; padding: 4px 12px;
      font-size: 12px; font-weight: 700;
    }
    .chooser-cta {
      margin-top: auto; padding-top: 24px;
      font-family: var(--fd); font-weight: 800; font-size: 18px;
      display: flex; align-items: center; gap: 8px;
      border-top: 1.5px solid var(--line);
    }
    .chooser-card.rayyan .chooser-cta { color: var(--tomato); }
    .chooser-card.raya   .chooser-cta { color: var(--mawar); }

    /* AUTH BAR */
    .auth-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--indigo); color: #fff; padding: 10px 48px;
      font-size: 13px; font-weight: 600; gap: 12px; flex-wrap: wrap;
    }
    @media (max-width: 860px) { .auth-bar { padding: 10px 28px; } }
    @media (max-width: 560px) { .auth-bar { padding: 10px 18px; } }
    .auth-bar a, .auth-bar button {
      background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.3);
      border-radius: 999px; padding: 5px 14px; color: #fff;
      font-size: 12px; font-weight: 700; text-decoration: none; cursor: pointer;
      font-family: var(--fb); transition: background .18s;
    }
    .auth-bar a:hover, .auth-bar button:hover { background: rgba(255,255,255,.3); }
    .auth-bar-left { display: flex; align-items: center; gap: 10px; }
    .auth-bar-right { display: flex; align-items: center; gap: 8px; }

    /* FOOTER */
    .footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 0 52px; border-top: 2px solid var(--ink);
      font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
      color: var(--muted); flex-wrap: wrap; gap: 12px;
    }
    .footer a:hover { color: var(--tomato); }

    @media (max-width: 500px) { .hero { padding-top: 44px; } }
  </style>
</head>
<body>

<!-- Auth bar – hidden until Firebase loads -->
<div id="authBar" style="display:none">
  <!-- filled by JS -->
</div>

<div class="shell">

  <header>
    <nav class="nav">
      <a href="/" class="brand">
        <svg width="32" height="32" viewBox="0 0 100 100" fill="none">
          <circle cx="38" cy="50" r="22" fill="none" stroke="var(--ink)" stroke-width="14"/>
          <rect x="54" y="28" width="14" height="44" fill="var(--ink)"/>
          <circle cx="78" cy="22" r="8" fill="#FF5C39"/>
        </svg>
        <div class="brand-divider"></div>
        <div>
          <div class="brand-wordmark">adhi</div>
          <div class="brand-sub">Learn</div>
        </div>
      </a>
      <a href="/" class="nav-back">← Semua Kursus</a>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-eyebrow">Zona Belajar Khusus</div>
    <h1 class="hero-h1">Siapa<br>yang main<br>hari ini?</h1>
    <p class="hero-lead">Pilih namamu – lalu langsung masuk ke dunia petualanganmu sendiri!</p>
  </section>

  <div class="chooser" id="chooser">
    <!-- filled by JS – shows parent's kids when logged in, default cards otherwise -->
  </div>

  <footer class="footer">
    <span>© 2026 Learn with Adhi · Dibuat dengan ❤️ untuk Rayyan &amp; Raya</span>
    <a href="/">← Kembali ke semua kursus</a>
  </footer>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js" defer></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js" defer></script>
<script src="/assets/js/auth.js" defer></script>
<script>
  function sumStars(keys) {
    let t = 0;
    for (const k of keys) {
      try { const d = JSON.parse(localStorage.getItem(k)||'{}'); t += d.totalStars||0; } catch(e){}
    }
    return t;
  }

  const DEFAULT_CARDS = [
    {
      href: 'rayyan.html', cls: 'rayyan', avatar: '🧒', name: 'Rayyan',
      desc: 'Petualangan angka, robot kereta, dan game seru.',
      pills: ['📚 14 petualangan','🎮 2 game'],
      starsKeys: ['rayyanMath','rayyanMath3','rayyanMath4','rayyanMath5','rayyanCoding','rayyanMath6','rayyanCoding2','rayyanMath7','rayyanCoding3','rayyanCoding4','rayyanCoding5','rayyanBridge','rayyanBalance','rayyanMasinis'],
      cta: 'Masuk Dunia Rayyan →',
    },
    {
      href: 'raya.html', cls: 'raya', avatar: '👧', name: 'Raya',
      desc: 'Belajar visual, warna, bentuk, akuarium & kereta 3D, dan game cari-cari.',
      pills: ['📚 7 kursus','🎮 3 game'],
      starsKeys: ['rayaMath','rayaVisual','rayaLiteracy','rayaLogic','rayaWorld','rayaStory','rayaTracing','rayaAkuarium','rayaKereta'],
      cta: 'Masuk Dunia Raya →',
    },
  ];

  function renderDefaultCards() {
    document.getElementById('chooser').innerHTML = DEFAULT_CARDS.map(c => `
      <a href="${c.href}" class="chooser-card ${c.cls}">
        <div class="chooser-avatar">${c.avatar}</div>
        <div class="chooser-name">${c.name}</div>
        <div class="chooser-desc">${c.desc}</div>
        <div class="chooser-stats">
          ${c.pills.map(p => `<div class="chooser-pill">${p}</div>`).join('')}
          <div class="chooser-pill">⭐ ${sumStars(c.starsKeys)} bintang</div>
        </div>
        <div class="chooser-cta">${c.cta}</div>
      </a>`).join('');
  }

  function renderAuthCards(kids) {
    if (!kids.length) {
      document.getElementById('chooser').innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:48px 24px;border:2.5px dashed var(--line);border-radius:24px">
          <div style="font-size:48px;margin-bottom:12px">👶</div>
          <div style="font-family:var(--fd);font-weight:800;font-size:22px;margin-bottom:8px">Belum ada profil anak</div>
          <div style="font-size:14px;color:var(--muted);margin-bottom:20px">Tambahkan dari dashboard orang tua.</div>
          <a href="/dashboard.html" style="display:inline-block;padding:12px 24px;background:var(--indigo);color:#fff;border:2px solid var(--ink);border-radius:10px;font-family:var(--fd);font-weight:700;text-decoration:none">
            Buka Dashboard →
          </a>
        </div>`;
      return;
    }
    document.getElementById('chooser').innerHTML = kids.map(kid => {
      const hub   = AUTH.HUB_BY_TYPE[kid.progressType] || '/rayyan.html';
      const cls   = kid.progressType === 'raya' ? 'raya' : 'rayyan';
      const keys  = AUTH.PROGRESS_KEYS_BY_TYPE[kid.progressType] || [];
      const stars = sumStars(keys);
      return `
        <a href="${hub}" class="chooser-card ${cls}" onclick="AUTH.setActiveKid('${kid.id}')">
          <div class="chooser-avatar">${kid.emoji || '🧒'}</div>
          <div class="chooser-name">${kid.name}</div>
          <div class="chooser-desc">Tap untuk masuk ke dunia petualanganmu!</div>
          <div class="chooser-stats">
            <div class="chooser-pill">⭐ ${stars} bintang</div>
          </div>
          <div class="chooser-cta">Masuk Dunia ${kid.name} →</div>
        </a>`;
    }).join('');
  }

  /* Start with default cards immediately (no flicker) */
  renderDefaultCards();

  /* Then upgrade to auth-aware cards once Firebase loads */
  window.addEventListener('load', () => {
    if (typeof AUTH === 'undefined') return;
    AUTH.init();
    AUTH.onAuthChange(async user => {
      const bar = document.getElementById('authBar');
      if (user) {
        /* Auth bar – logged in */
        bar.className = 'auth-bar';
        bar.style.display = '';
        bar.innerHTML = `
          <div class="auth-bar-left">
            👋 Hai, <strong>${user.displayName || user.email}</strong>!
          </div>
          <div class="auth-bar-right">
            <a href="/dashboard.html">📊 Dashboard</a>
            <button onclick="AUTH.signOut().then(()=>location.reload())">Keluar</button>
          </div>`;
        /* Show kids from Firestore */
        const kids = await AUTH.getKids();
        /* Pull latest progress before rendering */
        for (const kid of kids) {
          await AUTH.pullKidProgress(kid.id).catch(() => {});
        }
        /* Reload kid data with fresh progress embedded */
        const freshKids = await AUTH.getKids();
        renderAuthCards(freshKids);
      } else {
        /* Auth bar – logged out: show subtle login prompt */
        bar.className = 'auth-bar';
        bar.style.display = '';
        bar.innerHTML = `
          <div class="auth-bar-left" style="opacity:.8">
            👨‍👧‍👦 Orang tua? Pantau progres anak dari dashboard.
          </div>
          <div class="auth-bar-right">
            <a href="/login.html">Masuk sebagai Orang Tua</a>
          </div>`;
        renderDefaultCards();
      }
    });
  });

  /* Offline layer (plan-v4 B1): precaches the whole kid world for car-trip mode. */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
