<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learn with Adhi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;600&display=swap"
    />
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script>
      window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <script>
      (function () {
        const saved = localStorage.getItem("theme");
        const system = matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", saved || system);
      })();
    </script>
    <style>
      :root {
        --sky: #18b4d9;
        --red: #d94331;
        --green: #1e9b4d;
        --yellow: #f3c23a;
        --magenta: #d6398a;
        --navy: #1a3a7a;
        --cream: #fbf4e4;

        --font-display: "DM Serif Display", Georgia, serif;
        --font-body: "Nunito", system-ui, sans-serif;
        --font-mono: "JetBrains Mono", ui-monospace, monospace;

        --r-sm: 8px;
        --r-md: 16px;
        --r-lg: 22px;
        --r-pill: 999px;
      }

      [data-theme="light"] {
        --bg: var(--cream);
        --surface: #fff;
        --surface-soft: #f9f1df;
        --text: #1f2430;
        --text-dim: #5e6475;
        --border: rgba(26, 58, 122, 0.18);
        --shadow: 0 8px 28px rgba(26, 58, 122, 0.14);
        --hero: var(--yellow);
        --hero-text: var(--navy);
        --chip-bg: rgba(26, 58, 122, 0.08);
      }

      [data-theme="dark"] {
        --bg: #0b0f1a;
        --surface: #141a2b;
        --surface-soft: #1b2238;
        --text: #f5f7ff;
        --text-dim: #b8bfd6;
        --border: rgba(255, 255, 255, 0.18);
        --shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        --hero: #1f3f82;
        --hero-text: #f3c23a;
        --chip-bg: rgba(255, 255, 255, 0.09);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-body);
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }

      .shell {
        max-width: 1120px;
        margin: 0 auto;
        padding: 28px 20px 72px;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: var(--navy);
        color: var(--yellow);
        display: grid;
        place-items: center;
        font-family: var(--font-mono);
        font-weight: 700;
        font-size: 0.82rem;
      }

      .brand h1 {
        font-family: var(--font-display);
        font-size: clamp(1.1rem, 2.2vw, 1.6rem);
        letter-spacing: -0.02em;
        line-height: 1.1;
      }

      .brand p {
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--text-dim);
      }

      .theme-toggle {
        border: 2px solid var(--border);
        background: var(--surface);
        color: var(--text);
        border-radius: var(--r-pill);
        padding: 7px 12px;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        font-weight: 600;
        cursor: pointer;
      }

      .hero {
        background: var(--hero);
        color: var(--hero-text);
        border: 2px solid var(--navy);
        border-radius: var(--r-lg);
        box-shadow: 8px 8px 0 var(--navy);
        padding: clamp(24px, 5vw, 52px);
        margin-bottom: 28px;
      }

      .hero-eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-mono);
        font-size: 0.68rem;
        text-transform: uppercase;
        letter-spacing: 0.09em;
        background: rgba(255, 255, 255, 0.24);
        border: 1px solid rgba(26, 58, 122, 0.4);
        border-radius: var(--r-pill);
        padding: 5px 10px;
        margin-bottom: 14px;
      }

      .hero h2 {
        font-family: var(--font-display);
        font-size: clamp(2rem, 6vw, 3.8rem);
        line-height: 1.05;
        letter-spacing: -0.03em;
        margin-bottom: 10px;
      }

      .hero p {
        max-width: 64ch;
        font-size: clamp(0.96rem, 2.2vw, 1.15rem);
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      .section-title h3 {
        font-family: var(--font-mono);
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-dim);
      }

      .section-title a {
        font-family: var(--font-mono);
        font-size: 0.72rem;
        text-decoration: none;
        color: var(--navy);
      }

      [data-theme="dark"] .section-title a {
        color: var(--yellow);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 260px), 1fr));
        gap: 14px;
      }

      .card {
        text-decoration: none;
        color: inherit;
        background: var(--surface);
        border: 2px solid var(--border);
        border-radius: var(--r-md);
        padding: 18px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: transform 0.2s ease, border-color 0.2s ease;
      }

      .card:hover {
        transform: translateY(-3px);
        border-color: var(--card-accent, var(--navy));
      }

      .card-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .icon {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        font-size: 1.05rem;
        background: var(--surface-soft);
        border: 1px solid var(--border);
      }

      .chip {
        font-family: var(--font-mono);
        font-size: 0.64rem;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        border-radius: var(--r-pill);
        padding: 4px 8px;
        background: var(--chip-bg);
        color: var(--text-dim);
      }

      .card h4 {
        font-family: var(--font-display);
        font-size: 1.28rem;
        line-height: 1.2;
        letter-spacing: -0.01em;
      }

      .card p {
        color: var(--text-dim);
        font-size: 0.93rem;
        flex-grow: 1;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .tag {
        font-family: var(--font-mono);
        font-size: 0.64rem;
        border: 1px solid var(--border);
        border-radius: var(--r-pill);
        padding: 4px 7px;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .card-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-top: 1px solid var(--border);
        padding-top: 10px;
        font-size: 0.78rem;
        color: var(--text-dim);
      }

      .cta {
        font-weight: 700;
        color: var(--card-accent, var(--navy));
      }

      .footer {
        margin-top: 28px;
        border-top: 2px solid var(--border);
        padding-top: 14px;
        font-size: 0.8rem;
        color: var(--text-dim);
      }

      @media (max-width: 640px) {
        .shell {
          padding: 18px 14px 56px;
        }

        .hero {
          box-shadow: 6px 6px 0 var(--navy);
          margin-bottom: 22px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="nav">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">LW</div>
          <div>
            <h1>Learn with Adhi</h1>
            <p>Course Hub</p>
          </div>
        </div>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle theme">Theme</button>
      </header>

      <section class="hero" aria-label="Introduction">
        <div class="hero-eyebrow">◆ Practical Learning Hub</div>
        <h2>Learn something worth knowing.</h2>
        <p>
          Curated courses and tools built with your design system style—clear, bold, and beginner-friendly.
        </p>
      </section>

      <section>
        <div class="section-title">
          <h3>Courses & Tools</h3>
          <a href="design-system/tca-design-system.html">View design system →</a>
        </div>
        <main id="courseGrid" class="grid" aria-live="polite"></main>
      </section>

      <footer class="footer">© 2026 Learn with Adhi · Built with curiosity</footer>
    </div>

    <script>
      const items = [
        {
          title: "How to Code for Non-Coders",
          desc: "Learn coding fundamentals in a practical, beginner-first way.",
          icon: "💻",
          level: "Beginner",
          tags: ["Coding", "V1"],
          link: "courses/coding/code-ecosystem-guide-complete-v1.html",
          accent: "#1a3a7a"
        },
        {
          title: "Carbon Accounting",
          desc: "Understand emissions measurement and reporting with practical examples.",
          icon: "🌍",
          level: "Beginner",
          tags: ["Climate", "V1"],
          link: "courses/carbon-accounting/carbon-accounting-course.html",
          accent: "#1e9b4d"
        },
        {
          title: "Bridging the AI Gap",
          desc: "Build AI literacy and useful workflows for real-world work.",
          icon: "🤖",
          level: "Beginner",
          tags: ["AI", "V1"],
          link: "courses/ai/ai-capability-course.html",
          accent: "#18b4d9"
        },
        {
          title: "Bahasa Hacking — IELTS",
          desc: "IELTS strategy for Indonesian speakers with practical language habits.",
          icon: "🇮🇩",
          level: "Beginner",
          tags: ["IELTS", "V1"],
          link: "courses/ielts/ielts-bahasa-hacking.html",
          accent: "#f3c23a"
        },
        {
          title: "Band 7 Precision Lab",
          desc: "Target Band 7 with structured drills and scoring clarity.",
          icon: "🎯",
          level: "Intermediate",
          tags: ["IELTS", "V1"],
          link: "courses/ielts/ielts-band7-precision.html",
          accent: "#d6398a"
        },
        {
          title: "Feifelusiac Safe Area Calculator",
          desc: "Quickly calculate safe area values with practical controls.",
          icon: "🧮",
          level: "Tool",
          tags: ["Tools", "Live"],
          link: "courses/tools/feifelusiac-safe-area-calculator-v4.html",
          accent: "#d94331"
        },
        {
          title: "Rayyan & Raya's Train Adventure",
          desc: "A fun interactive train game for kids — tap, dodge, and keep the adventure going!",
          icon: "🚂",
          level: "Game",
          tags: ["Kids", "Live"],
          link: "courses/tools/train_adventure.html",
          accent: "#c0392b"
        },
        {
          title: "Rayyan & Raya's Train Adventure v2",
          desc: "The upgraded train adventure — new features, more fun, same great ride for kids!",
          icon: "🚃",
          level: "Game",
          tags: ["Kids", "V2", "Live"],
          link: "courses/tools/train_adventure_v2.html",
          accent: "#c0392b"
        }
      ];

      const grid = document.getElementById("courseGrid");
      items.forEach((item) => {
        const card = document.createElement("a");
        card.className = "card";
        card.href = item.link;
        card.style.setProperty("--card-accent", item.accent);
        card.innerHTML = `
          <div class="card-top">
            <div class="icon">${item.icon}</div>
            <span class="chip">${item.level}</span>
          </div>
          <h4>${item.title}</h4>
          <p>${item.desc}</p>
          <div class="tags">${item.tags.map((t) => `<span class="tag">${t}</span>`).join("")}</div>
          <div class="card-foot">
            <span>Learn with confidence</span>
            <span class="cta">Open →</span>
          </div>
        `;
        grid.appendChild(card);
      });

      const root = document.documentElement;
      const toggle = document.getElementById("themeToggle");
      toggle.addEventListener("click", () => {
        const next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
        root.setAttribute("data-theme", next);
        localStorage.setItem("theme", next);
      });
    </script>
  </body>
</html>
