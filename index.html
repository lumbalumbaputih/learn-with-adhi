<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhi's Learning Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root[data-theme="dark"] {
    --bg: #0f1117;
    --surface: #181a22;
    --border: #2a2d3a;
    --text: #e8e9ed;
    --text-dim: #8b8fa3;
    --accent-1: #6ee7b7;
    --accent-2: #818cf8;
    --toggle-bg: #2a2d3a;
    --toggle-knob: #e8e9ed;
  }
  :root[data-theme="light"] {
    --bg: #f4f3ef;
    --surface: #ffffff;
    --border: #e0dfd8;
    --text: #1a1a1a;
    --text-dim: #6b6b6b;
    --accent-1: #059669;
    --accent-2: #6366f1;
    --toggle-bg: #ddd9d0;
    --toggle-knob: #1a1a1a;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
    transition: background .35s, color .35s;
    -webkit-tap-highlight-color: transparent;
  }

  /* --- NAV --- */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 960px;
    margin: 0 auto;
    padding: 20px 24px 0;
  }
  nav .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--text);
    text-decoration: none;
  }
  .theme-toggle {
    position: relative;
    width: 56px; height: 30px;
    background: var(--toggle-bg);
    border-radius: 99px;
    border: none;
    cursor: pointer;
    transition: background .3s;
    flex-shrink: 0;
  }
  .theme-toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 24px; height: 24px;
    background: var(--toggle-knob);
    border-radius: 50%;
    transition: transform .3s, background .3s;
  }
  [data-theme="light"] .theme-toggle::after { transform: translateX(26px); }
  .theme-toggle .icon {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    font-size: .8rem;
    pointer-events: none;
    transition: opacity .25s;
  }
  .theme-toggle .icon-moon { left: 8px; }
  .theme-toggle .icon-sun  { right: 7px; }
  [data-theme="dark"]  .theme-toggle .icon-sun  { opacity: .3; }
  [data-theme="dark"]  .theme-toggle .icon-moon { opacity: 1; }
  [data-theme="light"] .theme-toggle .icon-moon { opacity: .3; }
  [data-theme="light"] .theme-toggle .icon-sun  { opacity: 1; }

  /* --- HERO --- */
  .hero {
    padding: 56px 24px 44px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 30% 20%, rgba(110,231,183,.08), transparent),
      radial-gradient(ellipse 500px 350px at 70% 60%, rgba(129,140,248,.07), transparent);
    pointer-events: none;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 5vw, 3.6rem);
    letter-spacing: -0.02em;
    margin-bottom: 14px;
    position: relative;
  }
  .hero h1 span { color: var(--accent-1); }
  .hero p {
    color: var(--text-dim);
    font-size: clamp(.93rem, 2.5vw, 1.1rem);
    max-width: 540px;
    margin: 0 auto;
    position: relative;
  }

  /* --- GRID --- */
  .courses {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(100%, 400px), 1fr));
    gap: 24px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 24px;
    display: flex; flex-direction: column; gap: 14px;
    transition: transform .25s, border-color .25s, box-shadow .25s, background .35s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--card-accent, var(--accent-1));
    box-shadow: 0 12px 40px -12px rgba(0,0,0,.35);
  }
  .card:active { transform: translateY(-1px); }
  .card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: var(--card-accent, var(--accent-1));
    opacity: 0; transition: opacity .25s;
  }
  .card:hover::after { opacity: 1; }

  .card-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: grid; place-items: center;
    font-size: 1.4rem;
    background: rgba(128,128,128,.1);
  }
  .card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem;
    letter-spacing: -0.01em;
  }
  .card .desc { color: var(--text-dim); font-size: .9rem; flex-grow: 1; }
  .tags { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag {
    font-size: .72rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .05em;
    padding: 4px 10px; border-radius: 6px;
    background: rgba(128,128,128,.1); color: var(--text-dim);
  }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 14px; border-top: 1px solid var(--border);
    font-size: .85rem; color: var(--text-dim);
  }
  .card-footer .cta { font-weight: 600; color: var(--card-accent, var(--accent-1)); }

  footer {
    text-align: center; padding: 28px 24px;
    color: var(--text-dim); font-size: .82rem;
    border-top: 1px solid var(--border);
    max-width: 960px; margin: 0 auto;
  }

  /* --- MOBILE --- */
  @media (max-width: 480px) {
    nav { padding: 14px 16px 0; }
    .hero { padding: 40px 18px 32px; }
    .courses { padding: 0 16px 56px; gap: 16px; }
    .card { padding: 22px 18px; gap: 12px; }
    .card h2 { font-size: 1.12rem; }
    footer { padding: 24px 16px; }
  }

  /* animation */
  .card { animation: fadeUp .5s ease both; }
  .card:nth-child(2) { animation-delay: .1s; }
  .card:nth-child(3) { animation-delay: .2s; }
  .card:nth-child(4) { animation-delay: .3s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="#">Adhi Katili</a>
  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span class="icon icon-moon">🌙</span>
    <span class="icon icon-sun">☀️</span>
  </button>
</nav>

<section class="hero">
  <h1>Learn with <span>Adhi</span></h1>
  <p>Free interactive courses on coding, sustainability, and more. Built for curious minds with zero prerequisites.</p>
</section>

<main class="courses" id="courses"></main>

<footer>&copy; 2026 Adhi Katili &middot; Built with curiosity</footer>

<script>
/*
 * ========================================
 *  COURSE DATA — ADD NEW COURSES HERE
 * ========================================
 *  {
 *    title:  "Course Name",
 *    desc:   "One-liner for the card.",
 *    icon:   "emoji",
 *    tags:   ["Tag1", "Tag2"],
 *    level:  "Beginner" | "Intermediate" | "Advanced",
 *    link:   "course-file.html",
 *    accent: "#hexcolor"
 *  }
 */
const courses = [
  {
    title:  "How to Code for Non-Coders",
    desc:   "A friendly, jargon-free introduction to programming concepts. Learn how websites and apps are built, write your first lines of code, and understand how developers think.",
    icon:   "💻",
    tags:   ["Coding", "Beginner-Friendly"],
    level:  "Beginner",
    link:   "coding-for-non-coders.html",
    accent: "#6ee7b7"
  },
  {
    title:  "Carbon Accounting",
    desc:   "Understand how organisations measure, report, and reduce their greenhouse gas emissions. Covers Scope 1-2-3 emissions, carbon footprints, and reporting frameworks.",
    icon:   "🌍",
    tags:   ["Sustainability", "Climate"],
    level:  "Beginner",
    link:   "carbon-accounting.html",
    accent: "#818cf8"
  }
];

const grid = document.getElementById('courses');
courses.forEach(c => {
  const a = document.createElement('a');
  a.href = c.link;
  a.className = 'card';
  if (c.accent) a.style.setProperty('--card-accent', c.accent);
  a.innerHTML = `
    <div class="card-icon">${c.icon}</div>
    <h2>${c.title}</h2>
    <p class="desc">${c.desc}</p>
    <div class="tags">${c.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
    <div class="card-footer">
      <span>${c.level}</span>
      <span class="cta">Start learning →</span>
    </div>`;
  grid.appendChild(a);
});

// Theme toggle — remembers preference, defaults to system
const toggle = document.getElementById('themeToggle');
const root = document.documentElement;
const saved = localStorage.getItem('theme');
const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
root.setAttribute('data-theme', saved || systemTheme);
toggle.addEventListener('click', () => {
  const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});
</script>
</body>
</html>
